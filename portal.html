<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <link rel="icon" type="image/webp" href="logo.webp"/>
  <title>NetNo Games | Developer workspace</title>
  <!-- Tailwind CSS CDN with forms/container plugins -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
  <!-- Design System Variables & Core Styles -->
  <link href="style.css" rel="stylesheet"/>
  <!-- Tailwind configurations mapping to design system tokens -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: "var(--bg-color)",
            surface: "var(--surface-color)",
            "surface-dim": "var(--surface-dim)",
            "surface-bright": "var(--surface-bright)",
            "surface-container": "var(--surface-high)",
            "on-surface": "var(--on-surface)",
            "on-surface-variant": "var(--on-surface-variant)",
            "outline-variant": "var(--outline-variant)",
            "primary-color": "var(--primary-color)",
            "secondary-color": "var(--secondary-color)",
          },
          fontFamily: {
            display: ["Syne", "sans-serif"],
            body: ["Outfit", "sans-serif"],
          },
          spacing: {
            "margin-mobile": "16px",
            "margin-desktop": "64px",
            gutter: "24px",
            md: "24px",
            lg: "48px",
            xl: "80px",
          }
        }
      }
    };
  </script>
</head>
<body class="bg-background text-on-surface flex flex-col font-body overflow-x-hidden min-h-screen">

  <!-- Header injected here -->
  <header id="global-header" class="h-20"></header>

  <!-- Main Container -->
  <main class="flex-grow w-full max-w-screen-2xl mx-auto px-margin-mobile md:px-margin-desktop py-8 md:py-12 fade-in" id="portal-root">
    <!-- Loaded dynamically depending on auth status -->
    <div class="h-96 rounded-lg border border-outline-variant/30 skeleton"></div>
  </main>

  <!-- Footer injected here -->
  <footer id="global-footer"></footer>

  <!-- Scripts -->
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>


  <script src="app.js"></script>
  
  <script>
    // In-memory screenshots holder during game creation/editing
    let activeScreenshotsList = [];

    // 25 Genres taxonomy
    const TAXONOMY_GENRES = [
      "Action", "Action-Adventure", "Adventure", "Arcade", "Battle Royale", 
      "Card & Board", "Casual", "Educational", "Fighting", "FPS / Shooter", 
      "Horror", "MMORPG", "Multiplayer / Co-op", "Open World", "Platformer", 
      "Puzzle", "Racing", "RPG", "RTS", "Sandbox", "Simulation", "Sports", 
      "Strategy", "Survival", "Survival Horror", "Tactical"
    ];

    // 13 Themes taxonomy
    const TAXONOMY_THEMES = [
      "Abstract", "Anime", "Cyberpunk", "Fantasy", "Horror", "Medieval", 
      "Military", "Modern", "Post-Apocalyptic", "Retro", "Sci-Fi", "Steampunk", "Supernatural"
    ];

    document.addEventListener("DOMContentLoaded", async () => {
      // Wait for Firebase auth to resolve before deciding which view to show
      await new Promise(resolve => {
        const unsub = firebase.auth().onAuthStateChanged(user => {
          resolve(user);
        });
      });
      // Handle redirect result from previous sign-in attempt (if popup was blocked)
      try {
        const result = await firebase.auth().getRedirectResult();
        if (result && result.user) {
          console.log("[Auth] Redirect sign-in successful:", result.user.email);
          location.reload();
          return;
        }
      } catch (err) {
        console.error("[Auth] Redirect result error:", err.code, err.message);
      }
      renderPortalView();
    });

    // Main Portal View Router/Toggle
    function renderPortalView() {
      const root = document.getElementById("portal-root");
      
      // Check query parameter for public preview link
      const isPublicPreview = new URLSearchParams(window.location.search).get("preview") === "true";
      if (isPublicPreview) {
        renderPublicProfilePreview();
        return;
      }

      if (!window.auth.isLoggedIn()) {
        renderLoginForm();
      } else if (window.auth.isAdmin()) {
        renderDashboard();
      } else {
        renderUserProfile();
      }
    }

    // 1. LOGIN SCREEN
    function renderLoginForm() {
      const root = document.getElementById("portal-root");
      root.innerHTML = `
        <div class="max-w-md w-full mx-auto bg-surface border-2 border-primary-color/40 p-8 rounded-lg shadow-2xl relative mt-8" style="background-color: var(--surface-color);">
          <div class="absolute top-0 left-0 w-full h-1 bg-primary-color"></div>
          
          <div class="text-center mb-8">
            <span class="text-secondary-color font-display font-semibold tracking-wider text-[10px] uppercase">Access Terminal</span>
            <h2 class="font-display text-3xl md:text-4xl lg:text-6xl font-bold text-primary-color text-glow mt-1">SIGN IN</h2>
            <p class="font-body text-xs text-on-surface-variant/80 mt-1">Sign in with your Google account to access your library and more.</p>
          </div>

          <div id="firebase-login-section" class="space-y-6">
            <div id="login-loading" class="text-center py-6 hidden">
              <div class="inline-block w-8 h-8 border-2 border-primary-color/30 border-t-primary-color rounded-full animate-spin"></div>
              <p class="text-xs text-on-surface-variant mt-3 font-body">Authenticating...</p>
            </div>

            <button id="btn-google-login" onclick="executeGoogleLogin()" class="w-full py-3.5 bg-white text-gray-800 font-display font-bold uppercase tracking-wider text-xs rounded hover:bg-gray-100 transition-all active:scale-95 flex items-center justify-center gap-3 border border-gray-300 shadow-sm">
              <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
              Sign in with Google
            </button>

            <div id="login-error" class="hidden bg-red-950/40 border border-red-500/30 rounded p-3 text-center">
              <p class="text-xs text-red-400 font-body" id="login-error-text"></p>
            </div>
          </div>

          <div class="mt-6 border-t border-outline-variant/20 pt-4 text-center">
            <p class="text-[10px] text-on-surface-variant/75 leading-relaxed">
              Sign in to wishlist games, track downloads,<br/>and submit support tickets.
            </p>
          </div>
        </div>
      `;
    }

    window.executeGoogleLogin = async function() {
      const loadingEl = document.getElementById("login-loading");
      const btnEl = document.getElementById("btn-google-login");
      const errorEl = document.getElementById("login-error");
      const errorTextEl = document.getElementById("login-error-text");

      loadingEl.classList.remove("hidden");
      btnEl.classList.add("hidden");
      errorEl.classList.add("hidden");

      try {
        console.log("[Auth] Starting Google sign-in popup...");
        const result = await window.auth.loginWithGoogle();
        console.log("[Auth] Google sign-in successful. User:", result.email);

        const user = window.auth.getUser();
        if (user) {
          const isAdmin = window.auth.isAdmin();
          window.toast(isAdmin ? "Access granted. Welcome back, operator." : "Signed in successfully!", "success");
          location.reload();
        }
      } catch (err) {
        console.error("[Auth] Firebase login error:", err.code, err.message);
        loadingEl.classList.add("hidden");
        btnEl.classList.remove("hidden");

        let msg = "Authentication failed. Please try again.";
        if (err.code === "auth/popup-closed-by-user") {
          msg = "Login popup was closed before completing. Please try again.";
        } else if (err.code === "auth/popup-blocked") {
          msg = "Popup was blocked by the browser. Allow popups for this site and try again.";
        } else if (err.code === "auth/network-request-failed") {
          msg = "Network error. Check your internet connection.";
        } else if (err.code === "auth/operation-not-allowed") {
          msg = "Google Sign-In is not enabled in Firebase Console. Go to Authentication > Sign-in method and enable Google.";
        } else if (err.code === "auth/unauthorized-domain") {
          msg = "This domain is not authorized. Add it in Firebase Console > Authentication > Settings > Authorized domains.";
        } else {
          msg = `Auth error: ${err.code || err.message}. Check the browser console (F12) for details.`;
        }
        errorTextEl.textContent = msg;
        errorEl.classList.remove("hidden");
        window.toast(msg, "error");
      }
    };

    // 1.5 USER PROFILE VIEW (for non-admin logged-in users)
    function renderUserProfile() {
      const root = document.getElementById("portal-root");
      const email = window.auth.getUserEmail();
      const name = window.auth.getUserName() || email;
      const photo = window.auth.getUserPhoto();
      const user = window.db.getUser(email);
      const games = window.db.getGames();

      const gameTitle = (id) => {
        const g = games.find(g => g.id === id);
        return g ? g.title : id;
      };

      const wishlistItems = (user && user.wishlist) || [];
      const downloadItems = (user && user.downloads) || [];
      const tickets = (user && user.tickets) || [];

      root.innerHTML = `
        <div class="max-w-2xl w-full mx-auto py-12 fade-in">
          <div class="bg-surface border border-outline-variant/30 rounded-xl p-8 shadow-xl" style="background-color: var(--surface-color);">

            <div class="flex items-center gap-4 mb-8 pb-6 border-b border-outline-variant/20">
              ${photo ? `<img src="${photo}" class="w-14 h-14 rounded-full border border-outline-variant/30 object-cover"/>` : `<span class="w-14 h-14 rounded-full bg-primary-color/20 flex items-center justify-center text-primary-color font-display font-bold text-xl">${(name)[0].toUpperCase()}</span>`}
              <div>
                <h1 class="font-display text-xl font-bold text-on-surface">${name}</h1>
                <p class="font-body text-xs text-on-surface-variant/70">${email}</p>
              </div>
            </div>

            <!-- Wishlist -->
            <div class="mb-6">
              <div class="flex items-center gap-2 mb-3">
                <span class="material-symbols-outlined text-[18px] text-primary-color">favorite</span>
                <h2 class="font-display text-sm font-bold text-on-surface tracking-wide">Wishlist</h2>
                <span class="text-[10px] font-body text-on-surface-variant/60">(${wishlistItems.length})</span>
              </div>
              ${wishlistItems.length === 0 ? `<p class="text-xs text-on-surface-variant/50 font-body">Nothing wishlisted yet.</p>` : `
                <div class="flex flex-wrap gap-2">
                  ${wishlistItems.map(id => `<span class="inline-block bg-primary-color/10 text-primary-color text-[11px] font-medium font-body px-2.5 py-1 rounded border border-primary-color/20">${gameTitle(id)}</span>`).join('')}
                </div>
              `}
            </div>

            <!-- Downloads -->
            <div class="mb-6">
              <div class="flex items-center gap-2 mb-3">
                <span class="material-symbols-outlined text-[18px] text-secondary-color">download</span>
                <h2 class="font-display text-sm font-bold text-on-surface tracking-wide">Downloads</h2>
                <span class="text-[10px] font-body text-on-surface-variant/60">(${downloadItems.length})</span>
              </div>
              ${downloadItems.length === 0 ? `<p class="text-xs text-on-surface-variant/50 font-body">No downloads yet.</p>` : `
                <div class="flex flex-wrap gap-2">
                  ${downloadItems.map(id => `<span class="inline-block bg-secondary-color/10 text-secondary-color text-[11px] font-medium font-body px-2.5 py-1 rounded border border-secondary-color/20">${gameTitle(id)}</span>`).join('')}
                </div>
              `}
            </div>

            <!-- Support Tickets -->
            <div>
              <div class="flex items-center gap-2 mb-3">
                <span class="material-symbols-outlined text-[18px] text-amber-400">support_agent</span>
                <h2 class="font-display text-sm font-bold text-on-surface tracking-wide">Support Tickets</h2>
                <span class="text-[10px] font-body text-on-surface-variant/60">(${tickets.length})</span>
              </div>
              ${tickets.length === 0 ? `<p class="text-xs text-on-surface-variant/50 font-body">No support tickets opened.</p>` : `
                <div class="space-y-2">
                  ${tickets.map(t => `
                    <div class="bg-background/50 border border-outline-variant/20 rounded-lg p-3">
                      <div class="flex items-center justify-between mb-1">
                        <span class="font-display text-xs font-semibold text-on-surface">${t.subject}</span>
                        <span class="text-[9px] font-body text-on-surface-variant/50">${t.date || ''}</span>
                      </div>
                      <p class="text-[11px] font-body text-on-surface-variant/70 leading-relaxed">${t.message}</p>
                      ${t.status ? `<span class="inline-block mt-1.5 text-[9px] font-bold uppercase font-display px-1.5 py-0.5 rounded ${t.status === 'resolved' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-amber-500/10 text-amber-400'}">${t.status}</span>` : ''}
                    </div>
                  `).join('')}
                </div>
              `}
            </div>

          </div>
        </div>
      `;
    }

    // 2. DASHBOARD SHELL
    function renderDashboard() {
      const root = document.getElementById("portal-root");
      const games = window.db.getGames();
      const queries = window.db.getSupportQueries();
      const announcements = window.db.getAnnouncements();

      const totalGames = games.length;
      const users = window.db.getUsers();
      const userEmails = Object.keys(users);

      root.innerHTML = `
        <div class="flex flex-col gap-8">
          
          <!-- Top Dashboard Header & Session Stats -->
          <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 pb-4 border-b border-outline-variant/20">
            <div>
              <div class="inline-flex items-center gap-3 mb-1">
                <div class="w-8 h-px bg-primary-color"></div>
                <span class="text-primary-color font-display font-semibold tracking-[0.2em] text-[10px] uppercase">Developer Panel</span>
              </div>
              <h1 class="font-display text-3xl md:text-4xl lg:text-6xl font-bold text-primary-color text-glow">Developer Dashboard</h1>
            </div>
            
            <div class="flex gap-3">
              <button onclick="window.auth.logout()" class="px-4 py-2 bg-red-950/40 text-red-400 border border-red-500/30 font-display text-[10px] uppercase font-semibold hover:bg-red-900/35 transition-all flex items-center gap-1.5">
                <span class="material-symbols-outlined text-[16px]">logout</span> Disconnect
              </button>
            </div>
          </div>

          <!-- Stats Bento Grid -->
          <div class="grid grid-cols-1 md:grid-cols-4 gap-5">
            <div class="bg-surface border border-outline-variant/20 p-5 flex items-center gap-4" style="background-color: var(--surface-color);">
              <div class="w-12 h-12 bg-primary-color/10 flex items-center justify-center text-primary-color">
                <span class="material-symbols-outlined text-[28px]">database</span>
              </div>
              <div>
                <span class="block text-[10px] text-on-surface-variant uppercase font-bold tracking-wider">Total Games</span>
                <span class="font-display text-2xl font-bold text-on-surface">${totalGames}</span>
              </div>
            </div>

            <div class="bg-surface border border-outline-variant/20 p-5 flex items-center gap-4" style="background-color: var(--surface-color);">
              <div class="w-12 h-12 bg-secondary-color/10 flex items-center justify-center text-secondary-color">
                <span class="material-symbols-outlined text-[28px]">help_outline</span>
              </div>
              <div>
                <span class="block text-[10px] text-on-surface-variant uppercase font-bold tracking-wider">Open Queries</span>
                <span class="font-display text-2xl font-bold text-on-surface">${queries.length}</span>
              </div>
            </div>

            <div class="bg-surface border border-outline-variant/20 p-5 flex items-center gap-4" style="background-color: var(--surface-color);">
              <div class="w-12 h-12 bg-emerald-500/10 flex items-center justify-center text-emerald-400">
                <span class="material-symbols-outlined text-[28px]">visibility</span>
              </div>
              <div>
                <span class="block text-[10px] text-on-surface-variant uppercase font-bold tracking-wider">Public Titles</span>
                <span class="font-display text-2xl font-bold text-on-surface">${games.filter(g => g.visibility === 'Public').length}</span>
              </div>
            </div>

            <div class="bg-surface border border-outline-variant/20 p-5 flex items-center gap-4" style="background-color: var(--surface-color);">
              <div class="w-12 h-12 bg-amber-500/10 flex items-center justify-center text-amber-400">
                <span class="material-symbols-outlined text-[28px]">campaign</span>
              </div>
              <div>
                <span class="block text-[10px] text-on-surface-variant uppercase font-bold tracking-wider">Announcements</span>
                <span class="font-display text-2xl font-bold text-on-surface">${announcements.length}</span>
              </div>
            </div>
            <div class="bg-surface border border-outline-variant/20 p-5 flex items-center gap-4" style="background-color: var(--surface-color);">
              <div class="w-12 h-12 bg-indigo-500/10 flex items-center justify-center text-indigo-400">
                <span class="material-symbols-outlined text-[28px]">group</span>
              </div>
              <div>
                <span class="block text-[10px] text-on-surface-variant uppercase font-bold tracking-wider">Registered Users</span>
                <span class="font-display text-2xl font-bold text-on-surface">${userEmails.length}</span>
              </div>
            </div>
          </div>

          <!-- Tabs Panel Navigator -->
          <div class="flex gap-6 border-b border-outline-variant/15">
            <button onclick="switchTab('tab-showcase')" id="btn-tab-showcase" class="tab-btn px-2 py-3 font-display text-[11px] font-semibold uppercase text-primary-color border-b-2 border-primary-color tracking-wider">Showcase List</button>
            <button onclick="switchTab('tab-editor')" id="btn-tab-editor" class="tab-btn px-2 py-3 font-display text-[11px] font-semibold uppercase text-on-surface-variant border-b-2 border-transparent tracking-wider">Publish Game</button>
            <button onclick="switchTab('tab-queries')" id="btn-tab-queries" class="tab-btn px-2 py-3 font-display text-[11px] font-semibold uppercase text-on-surface-variant border-b-2 border-transparent tracking-wider flex items-center gap-1.5">
              Client Queries <span class="bg-primary-color/20 text-primary-color text-[9px] px-1.5 py-0.5 font-bold">${queries.length}</span>
            </button>
            <button onclick="switchTab('tab-announcements')" id="btn-tab-announcements" class="tab-btn px-2 py-3 font-display text-[11px] font-semibold uppercase text-on-surface-variant border-b-2 border-transparent tracking-wider flex items-center gap-1.5">
              Announcements <span class="bg-secondary-color/20 text-secondary-color text-[9px] px-1.5 py-0.5 font-bold">${announcements.length}</span>

            <button onclick="switchTab('tab-users')" id="btn-tab-users" class="tab-btn px-2 py-3 font-display text-[11px] font-semibold uppercase text-on-surface-variant border-b-2 border-transparent tracking-wider flex items-center gap-1.5">

                  </div>
                  <div>
                    <label class="block text-[10px] text-on-surface-variant font-bold uppercase mb-1.5">YouTube Trailer Link (Video URL)</label>
                    <input type="url" id="game-trailer" class="w-full bg-background border border-outline-variant/40 rounded px-3 py-2.5 text-xs custom-input" placeholder="e.g. https://www.youtube.com/embed/..."/>
                  </div>
                  <div class="grid grid-cols-2 gap-4">
                    <div>
                      <label class="block text-[10px] text-on-surface-variant font-bold uppercase mb-1.5">Genre Taxonomy</label>
                      <select id="game-genre" class="w-full bg-background border border-outline-variant/40 rounded px-3 py-2.5 text-xs custom-input">
                        <!-- Populated by JavaScript -->
                      </select>
                    </div>
                    <div>
                      <label class="block text-[10px] text-on-surface-variant font-bold uppercase mb-1.5">Theme Taxonomy</label>
                      <select id="game-theme" class="w-full bg-background border border-outline-variant/40 rounded px-3 py-2.5 text-xs custom-input">
                        <!-- Populated by JavaScript -->
                      </select>
                    </div>
                  </div>
                  <div class="grid grid-cols-3 gap-4">

    // Tab switcher
    window.switchTab = function(tabId) {
      document.querySelectorAll(".tab-pane").forEach(pane => pane.classList.add("hidden"));
      document.getElementById(tabId).classList.remove("hidden");

      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.classList.remove("text-primary-color", "border-primary-color");
        btn.classList.add("text-on-surface-variant", "border-transparent");
      });
      
      const activeBtnId = `btn-${tabId}`;
      const activeBtn = document.getElementById(activeBtnId);
      if (activeBtn) {
        activeBtn.classList.add("text-primary-color", "border-primary-color");
        activeBtn.classList.remove("text-on-surface-variant", "border-transparent");
      }

      // Refresh dynamic content when switching tabs
      if (tabId === 'tab-users') renderUsersList();
    };

    // Toggle Paid pricing fields
    window.togglePriceInput = function(val) {
      const container = document.getElementById("price-input-container");
      const input = document.getElementById("game-price");
      if (val === "Paid") {
        container.classList.remove("hidden");
        input.required = true;
      } else {
        container.classList.add("hidden");
        input.required = false;
        input.value = "";
      }
    };

      const genresSelect = document.getElementById("game-genre");

      genresSelect.innerHTML = TAXONOMY_GENRES.map(g => `<option value="${g}">${g}</option>`).join('');
      themesSelect.innerHTML = TAXONOMY_THEMES.map(t => `<option value="${t}">${t}</option>`).join('');
    }

    window.editAnnouncementRegistry = function(id) {
      const ann = window.db.getAnnouncements().find(a => a.id === id);
      if (!ann) return;

      document.getElementById("edit-announcement-id").value = ann.id;
      document.getElementById("announcement-title").value = ann.title;
      document.getElementById("announcement-date").value = ann.date;
      document.getElementById("announcement-tag").value = ann.tag || "";
      document.getElementById("announcement-link").value = ann.link || "";
      document.getElementById("announcement-info").value = ann.info;

      document.getElementById("announcement-editor-title-label").innerText = `Edit Announcement: ${ann.title}`;
      document.getElementById("btn-announcement-submit").innerText = "Save Changes";
      document.getElementById("announcement-image-note").innerText = "Leave empty to keep current image.";
      switchTab("tab-announcement-editor");
    };

    window.saveAnnouncementRegistry = async function(e) {
      e.preventDefault();
      const btn = document.getElementById("btn-announcement-submit");
      btn.disabled = true;
      btn.innerText = "Saving...";

      try {
        const editId = document.getElementById("edit-announcement-id").value;
        const title = document.getElementById("announcement-title").value.trim();
        const date = document.getElementById("announcement-date").value;
        const tag = document.getElementById("announcement-tag").value.trim();
        const link = document.getElementById("announcement-link").value.trim();
        const info = document.getElementById("announcement-info").value.trim();
        const imageFile = document.getElementById("announcement-image-file");

        if (!title) throw new Error("Title is required.");
        if (!date) throw new Error("Date is required.");
        if (!info) throw new Error("Info text is required.");

        const annId = editId || "announce_" + Date.now();

        let imageUrl = "";
        if (imageFile.files.length > 0) {
          try {
            imageUrl = await window.uploadToImgur(imageFile.files[0]);
          } catch (err) {
            throw new Error("Image upload failed: " + (err.message || "unknown error"));
          }
        } else if (editId) {
          const current = window.db.getAnnouncements().find(a => a.id === editId);
          if (current) {
            imageUrl = current.image || "";
          }
        }

        const payload = {
          id: annId,
          title, date, info, tag,
          image: imageUrl
        };
        if (link) payload.link = link;

        window.db.saveAnnouncement(payload);
        window.toast(editId ? "Announcement saved successfully!" : "Announcement published successfully!", "success");

        renderAnnouncementsList();
        switchTab("tab-announcements");
      } catch (err) {
        window.toast("Error: " + err.message, "error");
      } finally {
        const label = document.getElementById("edit-announcement-id").value ? "Save Changes" : "Publish Announcement";
        btn.innerText = label;
        btn.disabled = false;
      }
    };

    window.deleteAnnouncementRegistry = async function(id, title) {
      if (confirm(`Remove announcement "${title}"?`)) {
        window.db.deleteAnnouncement(id);
        window.toast(`Announcement "${title}" removed.`, "success");
        renderAnnouncementsList();
      }
    };

      document.getElementById("game-desc").value = game.desc;
      document.getElementById("game-requirements").value = game.systemRequirements || "";
      document.getElementById("game-changelog").value = game.changelog || "";

      // Price type
      document.getElementById("game-price-type").value = game.priceType || (parseFloat(game.price) > 0 ? "Paid" : "Free");
      if (game.priceType === "Paid" || parseFloat(game.price) > 0) {
        document.getElementById("price-input-container").classList.remove("hidden");
        document.getElementById("game-price").value = game.price;
        document.getElementById("game-price").required = true;
      } else {
        document.getElementById("price-input-container").classList.add("hidden");
        document.getElementById("game-price").value = "";
        document.getElementById("game-price").required = false;
      }

      document.getElementById("editor-title-label").innerText = `Edit Game Settings: ${game.title}`;
      document.getElementById("btn-editor-submit").innerText = "Save changes";
      document.getElementById("thumb-edit-note").innerText = "Leave empty to keep current thumbnail image.";

      activeScreenshotsList = game.screenshots ? [...game.screenshots] : [];
      renderEditorScreenshotsList();

      switchTab("tab-editor");
    };

    // Screenshots array uploading to Imgur
    window.handleScreenshotsArrayUpload = async function(input) {
      const files = input.files;
      if (files.length === 0) return;

      if (activeScreenshotsList.length + files.length > 10) {
        window.toast("Maximum 10 screenshots allowed in repository array!", "warning");
        input.value = "";
        return;
      }

      for (let i = 0; i < files.length; i++) {
        try {
          const url = await window.uploadToImgur(files[i]);
          activeScreenshotsList.push(url);
        } catch (e) {
          window.toast("Screenshot upload failed: " + e.message, "error");
        }
      }

      renderEditorScreenshotsList();
      input.value = "";
    };

    function renderEditorScreenshotsList() {
      const container = document.getElementById("editor-screenshots-list");
      const label = document.getElementById("screenshots-count-label");
      
      container.innerHTML = "";
      label.innerText = `Currently selected: ${activeScreenshotsList.length}`;

      if (activeScreenshotsList.length === 0) {
        container.innerHTML = `<p class="text-[10px] text-on-surface-variant/80 w-full text-center py-2">No screenshots loaded yet.</p>`;
        return;
      }

      activeScreenshotsList.forEach((url, idx) => {
        const item = document.createElement("div");
        item.className = "relative h-16 w-24 border border-outline-variant/40 rounded overflow-hidden flex-shrink-0 group";
        item.innerHTML = `
          <img src="${url}" class="w-full h-full object-cover"/>
          <button type="button" onclick="removeEditorScreenshot(${idx})" class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center text-red-400 font-display text-[9px] font-bold uppercase transition-opacity">
            Remove
          </button>
        `;
        container.appendChild(item);
      });
    }

    window.removeEditorScreenshot = function(idx) {
      activeScreenshotsList.splice(idx, 1);
      renderEditorScreenshotsList();
    };

    // Save/Publish game handler
    window.saveGameRegistry = async function(e) {
      e.preventDefault();
      const btn = document.getElementById("btn-editor-submit");
      const origLabel = btn.innerText;
      btn.disabled = true;
      btn.innerText = "Saving...";

      try {
        const editId = document.getElementById("edit-game-id").value;
        const title = document.getElementById("game-title").value.trim();
        const trailer = document.getElementById("game-trailer").value.trim();
        const genre = document.getElementById("game-genre").value;
        const theme = document.getElementById("game-theme").value;
        const priceType = document.getElementById("game-price-type").value;
        const priceVal = document.getElementById("game-price").value;
        const visibility = document.getElementById("game-visibility").value;
        const url = document.getElementById("game-url").value.trim();
        const desc = document.getElementById("game-desc").value.trim();
        const requirements = document.getElementById("game-requirements").value.trim();
        const changelog = document.getElementById("game-changelog").value.trim();
        
        if (!title) throw new Error("Game title is required.");
        if (!desc) throw new Error("Game description is required.");

        const thumbFileInput = document.getElementById("game-thumb-file");
        const gameId = editId ? editId : "game_" + Date.now();

        // Upload new thumbnail to Imgur
        let thumbnailUrl = "";
        if (thumbFileInput.files.length > 0) {
          try {
            thumbnailUrl = await window.uploadToImgur(thumbFileInput.files[0]);
          } catch (err) {
            throw new Error("Thumbnail upload failed: " + (err.message || "unknown error"));
          }
        } else if (editId) {
          const current = window.db.getGame(editId);
          if (current) {
            thumbnailUrl = current.thumbnail;
          }
        } else {
          thumbnailUrl = "https://via.placeholder.com/600x400";
        }

        // Build game payload
        const gamePayload = {
          id: gameId,
          title, genre, theme,
          priceType,
          price: priceType === 'Free' || priceType === 'Upcoming' ? '0' : priceVal,
          desc, visibility, trailer,
          link: url,
          systemRequirements: requirements,
          changelog,
          screenshots: [...activeScreenshotsList],
          thumbnail: thumbnailUrl,
          developer: "admin@netno.games"
        };

        window.db.saveGame(gamePayload);
        window.toast(editId ? "Game updated successfully!" : "Game published successfully!", "success");

        activeScreenshotsList = [];
        renderShowcaseList();
        switchTab("tab-showcase");
      } catch (err) {
        window.toast("Error: " + err.message, "error");
      } finally {
        btn.innerText = origLabel;
        btn.disabled = false;
      }
    };

    window.deleteGameRegistry = async function(id, name) {
      if (confirm(`CRITICAL CONFIRMATION: Remove game catalog registration for "${name}"?`)) {
        window.db.deleteGame(id);
        window.toast(`Game "${name}" removed from database.`, "success");
        renderShowcaseList();
      }
    };

    window.deleteSupportQuery = function(id) {
      if (confirm("Clear support query ticket log?")) {
        let queries = window.db.getSupportQueries();
        queries = queries.filter(q => q.id !== id);
        localStorage.setItem("netno_support_queries", JSON.stringify(queries));
        window.toast("Support ticket cleared.", "success");
        renderQueriesList();
      }
    };


    // 4.5 ADMIN USERS LIST
    window.renderUsersList = function() {
      const container = document.getElementById("dashboard-users-list");
      if (!container) return;

      const users = window.db.getUsers();
      const userList = Object.values(users);
      const games = window.db.getGames();
      container.innerHTML = "";

      if (userList.length === 0) {
        container.innerHTML = `<div class="text-center py-12 text-on-surface-variant bg-surface border border-outline-variant/20 rounded-lg">No registered users yet.</div>`;
        return;
      }

      userList.forEach(u => {
        const isOwner = u.email.toLowerCase() === OWNER_EMAIL;
        const adminBadge = u.isAdmin ? '<span class="text-[9px] bg-primary-color/15 text-primary-color font-bold uppercase px-1.5 py-0.5 rounded">Admin</span>' : '<span class="text-[9px] bg-on-surface-variant/10 text-on-surface-variant font-bold uppercase px-1.5 py-0.5 rounded">User</span>';

        const wishlistedGames = (u.wishlist || []).map(id => games.find(g => g.id === id)).filter(Boolean);
        const purchasedGames = (u.purchases || []).map(id => games.find(g => g.id === id)).filter(Boolean);
        const tickets = u.tickets || [];

        const card = document.createElement("div");
        card.className = "bg-surface border border-outline-variant/20 overflow-hidden";
        card.style.backgroundColor = "var(--surface-color)";

        let adminActions = '';
        if (u.isAdmin) {
          if (!isOwner) {
            adminActions = `<button onclick="toggleUserAdmin('${u.email}', false)" class="px-3 py-1.5 border border-red-500/40 text-red-400 font-display text-[9px] uppercase font-bold hover:bg-red-500/10 transition-all">Remove Admin</button>`;
          } else {
            adminActions = `<span class="px-3 py-1.5 text-amber-400 font-display text-[9px] uppercase font-bold border border-amber-500/30">👑 Owner</span>`;
          }
        } else {
          adminActions = `<button onclick="toggleUserAdmin('${u.email}', true)" class="px-3 py-1.5 border border-primary-color text-primary-color font-display text-[9px] uppercase font-bold hover:bg-primary-color/10 transition-all">Make Admin</button>`;
        }

        card.innerHTML = `
          <div class="p-4 flex flex-col md:flex-row gap-4">
            <div class="flex items-center gap-3 md:w-72 flex-shrink-0">
              ${u.photoURL ? `<img src="${u.photoURL}" class="w-10 h-10 rounded-full border border-outline-variant/30 object-cover"/>` : `<span class="w-10 h-10 rounded-full bg-primary-color/20 flex items-center justify-center text-primary-color font-display font-bold text-sm">${(u.displayName || u.email)[0].toUpperCase()}</span>`}
              <div class="min-w-0">
                <h4 class="font-display font-bold text-sm text-on-surface truncate">${u.displayName || u.email.split('@')[0]}</h4>
                <p class="text-[10px] text-on-surface-variant/70 font-body truncate">${u.email}</p>
                <div class="flex gap-1 mt-1">${adminBadge}</div>
              </div>
            </div>
            <div class="flex-grow grid grid-cols-2 md:grid-cols-4 gap-3 text-center">
              <div class="bg-background/50 border border-outline-variant/10 p-2">
                <span class="block font-display font-bold text-sm text-primary-color">${(u.wishlist || []).length}</span>
                <span class="text-[8px] text-on-surface-variant/60 uppercase tracking-wider">Wishlist</span>
              </div>
              <div class="bg-background/50 border border-outline-variant/10 p-2">
                <span class="block font-display font-bold text-sm text-secondary-color">${(u.purchases || []).length}</span>
                <span class="text-[8px] text-on-surface-variant/60 uppercase tracking-wider">Purchases</span>
              </div>
              <div class="bg-background/50 border border-outline-variant/10 p-2">
                <span class="block font-display font-bold text-sm text-emerald-400">${(u.downloads || []).length}</span>
                <span class="text-[8px] text-on-surface-variant/60 uppercase tracking-wider">Downloads</span>
              </div>
              <div class="bg-background/50 border border-outline-variant/10 p-2">
                <span class="block font-display font-bold text-sm text-amber-400">${tickets.length}</span>
                <span class="text-[8px] text-on-surface-variant/60 uppercase tracking-wider">Tickets</span>
              </div>
            </div>
            <div class="flex items-center gap-2 flex-shrink-0">
              <button onclick="toggleUserExpand('${u.email}')" class="px-3 py-1.5 border border-outline-variant/30 text-on-surface-variant font-display text-[9px] uppercase font-bold hover:bg-surface-bright/20 transition-all">Details</button>
              ${adminActions}
            </div>
          </div>
          <div id="user-details-${u.email.replace(/[@.]/g, '_')}" class="hidden border-t border-outline-variant/15 p-4 bg-background/30 space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div>
                <h5 class="text-[10px] text-on-surface-variant font-bold uppercase mb-2">Wishlisted Games</h5>
                ${wishlistedGames.length === 0 ? '<p class="text-[10px] text-on-surface-variant/60">None</p>' : wishlistedGames.map(g => `
                  <div class="flex items-center gap-2 py-1">
                    <img src="${g.thumbnail || 'https://via.placeholder.com/32'}" class="w-6 h-6 object-cover rounded border border-outline-variant/20"/>
                    <span class="text-[10px] text-on-surface truncate">${g.title}</span>
                  </div>
                `).join('')}
              </div>
              <div>
                <h5 class="text-[10px] text-on-surface-variant font-bold uppercase mb-2">Purchased Games</h5>
                ${purchasedGames.length === 0 ? '<p class="text-[10px] text-on-surface-variant/60">None</p>' : purchasedGames.map(g => `
                  <div class="flex items-center gap-2 py-1">
                    <img src="${g.thumbnail || 'https://via.placeholder.com/32'}" class="w-6 h-6 object-cover rounded border border-outline-variant/20"/>
                    <span class="text-[10px] text-on-surface truncate">${g.title}</span>
                  </div>
                `).join('')}
              </div>
              <div>
                <h5 class="text-[10px] text-on-surface-variant font-bold uppercase mb-2">Support Tickets</h5>
                ${tickets.length === 0 ? '<p class="text-[10px] text-on-surface-variant/60">None</p>' : tickets.map(t => `
                  <div class="bg-background/50 border border-outline-variant/10 p-2 mb-1">
                    <p class="text-[9px] font-bold text-primary-color">${t.subject}</p>
                    <p class="text-[8px] text-on-surface-variant/60">${t.game} · ${t.date}</p>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    };

    window.toggleUserExpand = function(email) {
      const id = `user-details-${email.replace(/[@.]/g, '_')}`;
      const el = document.getElementById(id);
      if (el) el.classList.toggle("hidden");
    };

    window.toggleUserAdmin = function(email, makeAdmin) {
      const user = window.db.getUser(email);
      if (!user) return;
      if (!makeAdmin && email.toLowerCase() === OWNER_EMAIL) {
        window.toast("The owner cannot be removed from admin.", "error");
        return;
      }
      const action = makeAdmin ? "grant admin access to" : "remove admin access from";
      if (!confirm(`Are you sure you want to ${action} ${email}?`)) return;

      window.db.setUserAdmin(email, makeAdmin);
      window.toast(`Admin access ${makeAdmin ? 'granted' : 'removed'} for ${email}`, "success");
      renderUsersList();
    };

    // 5. PUBLIC PORTFOLIO PREVIEW VIEW
    function renderPublicProfilePreview() {
      const root = document.getElementById("portal-root");
      const profile = window.db.getDevProfile();
      
      // Get only developer's public games
      const devGames = window.db.getGames().filter(g => g.visibility === "Public" && g.developer === "admin@netno.games");

      root.innerHTML = `
        <div class="space-y-10 fade-in">
          
          <!-- Back button -->
          <div>
            <button onclick="window.history.back()" class="px-4 py-2 border border-outline-variant/40 rounded text-xs uppercase font-semibold text-on-surface-variant hover:text-primary-color transition-colors flex items-center gap-1">
              <span class="material-symbols-outlined text-[16px]">arrow_back</span> Return to workspace
            </button>
          </div>

          <!-- Studio Header Card -->
          <div class="bg-surface border border-outline-variant/30 rounded-lg p-8 relative overflow-hidden" style="background-color: var(--surface-color);">
            <div class="absolute -right-1/4 -top-1/4 w-[400px] h-[400px] bg-secondary-color/5 rounded-full blur-[80px] pointer-events-none"></div>
            
            <div class="flex flex-col md:flex-row gap-6 items-center md:items-start text-center md:text-left relative z-10">
              <img src="${profile.avatar || 'https://www.w3schools.com/howto/img_avatar.png'}" class="h-24 w-24 rounded-full border-2 border-primary-color object-cover shadow-xl"/>
              <div class="space-y-3 flex-grow">
                <div>
                  <span class="text-secondary-color font-display text-[10px] font-bold uppercase tracking-wider">Verified Publisher</span>
                  <h2 class="font-display text-2xl md:text-3xl font-bold text-on-surface text-glow">${profile.displayName}</h2>
                </div>
                <p class="font-body text-sm text-on-surface-variant max-w-2xl leading-relaxed">${profile.bio || 'Studio bio pending registry config...'}</p>
                
                <!-- Social Channels -->
                <div class="flex flex-wrap gap-3 justify-center md:justify-start pt-2">
                  ${profile.socials?.discord ? `<a href="https://${profile.socials.discord}" target="_blank" class="px-3 py-1 bg-background/50 border border-outline-variant/20 rounded text-[10px] uppercase font-bold text-on-surface-variant hover:text-primary-color flex items-center gap-1"><span class="material-symbols-outlined text-[12px]">forum</span> Discord</a>` : ''}
                  ${profile.socials?.reddit ? `<a href="https://${profile.socials.reddit}" target="_blank" class="px-3 py-1 bg-background/50 border border-outline-variant/20 rounded text-[10px] uppercase font-bold text-on-surface-variant hover:text-primary-color flex items-center gap-1"><span class="material-symbols-outlined text-[12px]">groups</span> Reddit</a>` : ''}
                  ${profile.socials?.youtube ? `<a href="https://${profile.socials.youtube}" target="_blank" class="px-3 py-1 bg-background/50 border border-outline-variant/20 rounded text-[10px] uppercase font-bold text-on-surface-variant hover:text-primary-color flex items-center gap-1"><span class="material-symbols-outlined text-[12px]">movie</span> YouTube</a>` : ''}
                  ${profile.socials?.twitter ? `<a href="https://${profile.socials.twitter}" target="_blank" class="px-3 py-1 bg-background/50 border border-outline-variant/20 rounded text-[10px] uppercase font-bold text-on-surface-variant hover:text-primary-color flex items-center gap-1"><span class="material-symbols-outlined text-[12px]">alternate_email</span> Twitter</a>` : ''}
                  ${profile.socials?.website ? `<a href="https://${profile.socials.website}" target="_blank" class="px-3 py-1 bg-background/50 border border-outline-variant/20 rounded text-[10px] uppercase font-bold text-on-surface-variant hover:text-primary-color flex items-center gap-1"><span class="material-symbols-outlined text-[12px]">public</span> Website</a>` : ''}
                </div>
              </div>
            </div>
          </div>

          <!-- Dev Portfolio Showcase Grid -->
          <div class="space-y-6">
            <h3 class="font-display text-lg font-bold uppercase tracking-wider text-on-surface border-b border-outline-variant/20 pb-2">
              Published Studio Catalog
            </h3>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
              ${devGames.length === 0 ? `
                <div class="col-span-3 text-center py-12 text-on-surface-variant bg-surface border border-outline-variant/20 rounded-lg p-6">
                  No public titles published under this portfolio profile.
                </div>
              ` : devGames.map(g => {
        const priceLabel = g.priceType === 'Free' ? 'FREE' : g.priceType === 'Upcoming' ? 'UPCOMING' : `₹${g.price}`;
                return `
                  <article class="bg-surface border border-outline-variant/30 rounded-lg overflow-hidden group hover:border-primary-color/50 transition-all duration-300 relative flex flex-col h-full" style="background-color: var(--surface-color);">
                    <div class="absolute top-0 left-0 w-full h-1 bg-primary-color scale-x-0 group-hover:scale-x-100 transition-transform origin-left z-10"></div>
                    <div class="h-44 overflow-hidden relative bg-black/40">
                      <img src="${g.thumbnail || 'https://via.placeholder.com/600x400'}" alt="${g.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 opacity-80 group-hover:opacity-100"/>
                    </div>
                    <div class="p-5 flex flex-col flex-grow">
                      <div class="flex items-center justify-between mb-2">
                        <span class="text-secondary-color font-display text-[9px] font-bold uppercase tracking-wider">${g.theme.split('/')[0].trim()}</span>
                        <span class="text-primary-color font-display text-xs font-bold bg-primary-color/10 px-2 py-0.5 rounded">${priceLabel}</span>
                      </div>
                      <h4 class="font-display text-base font-bold text-on-surface group-hover:text-primary-color transition-colors mb-2">${g.title}</h4>
                      <p class="font-body text-[11px] text-on-surface-variant line-clamp-2 mb-4 flex-grow leading-relaxed">${g.desc}</p>
                      <a href="game-detail.html?id=${g.id}" class="w-full py-2 bg-surface-bright/40 text-on-surface border border-outline-variant/30 rounded font-display text-[9px] font-semibold uppercase text-center transition-all group-hover:bg-primary-color group-hover:text-on-primary group-hover:border-primary-color">
                        Scan Console
                      </a>
                    </div>
                  </article>
                `;
              }).join('')}
            </div>
          </div>

        </div>
      `;
    }
  </script>
</body>
</html>
