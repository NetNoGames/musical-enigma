<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  font-family: Arial;
}

.loginBox {
  background: white;
  padding: 25px;
  border-radius: 10px;
  text-align: center;
}

.loginBox input {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 200px;
}

.loginBox button {
  padding: 10px 20px;
}
</style>

</head>
<body>

<div class="loginBox">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if (user === "admin" && pass === "1234") {
    alert("Login Successful!");
  } else {
    alert("Wrong Username or Password");
  }
}
</script>

</body>
</html>
