<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>NetNo Games | Game Library</title>
  <!-- Tailwind CSS CDN with forms/container plugins -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
  <!-- Design System Variables & Core Styles -->
  <link href="style.css" rel="stylesheet"/>
  <!-- Tailwind configurations mapping to design system tokens -->
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            background: "var(--bg-color)",
            surface: "var(--surface-color)",
            "surface-dim": "var(--surface-dim)",
            "surface-bright": "var(--surface-bright)",
            "surface-container": "var(--surface-high)",
            "on-surface": "var(--on-surface)",
            "on-surface-variant": "var(--on-surface-variant)",
            "outline-variant": "var(--outline-variant)",
            "primary-color": "var(--primary-color)",
            "secondary-color": "var(--secondary-color)",
          },
          fontFamily: {
            display: ["Syne", "sans-serif"],
            body: ["Outfit", "sans-serif"],
          },
          spacing: {
            "margin-mobile": "16px",
            "margin-desktop": "64px",
            gutter: "24px",
            md: "24px",
            lg: "48px",
            xl: "80px",
          }
        }
      }
    };
  </script>
</head>
<body class="bg-background text-on-surface flex flex-col font-body overflow-x-hidden min-h-screen">

  <!-- Header injected here -->
  <header id="global-header" class="h-20"></header>

  <!-- Main Content Area -->
  <main class="flex-grow w-full max-w-screen-2xl mx-auto px-margin-mobile md:px-margin-desktop py-6 md:py-12 fade-in">
    
    <!-- Header Section -->
    <header class="mb-6 md:mb-10 flex flex-col lg:flex-row justify-between items-start lg:items-end gap-4 md:gap-6">
      <div>
        <div class="inline-flex items-center gap-3 mb-3">
          <div class="w-8 h-px bg-primary-color"></div>
          <span class="text-primary-color font-display font-semibold tracking-[0.2em] text-[10px] uppercase">Ecosystem Directory</span>
        </div>
        <h1 class="font-display text-3xl md:text-4xl lg:text-6xl font-bold text-primary-color text-glow">The Verdant Archives</h1>
        <p class="font-body text-xs md:text-sm text-on-surface-variant max-w-xl mt-2 md:mt-3 leading-relaxed font-light">
          Browse through indie creations bridging biological isolation and cybernetic dread.
        </p>
      </div>
      
      <!-- Search Input -->
      <div class="w-full lg:w-96 relative group">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-color transition-colors">search</span>
        <input id="search-input" class="w-full bg-surface-bright/20 border border-outline-variant/50 text-on-surface font-body text-sm py-3 pl-10 pr-4 focus:outline-none focus:border-primary-color focus:ring-1 focus:ring-primary-color/30 transition-all placeholder:text-on-surface-variant/60" placeholder="Scan archives by title or description..." type="text"/>
      </div>
    </header>

    <!-- Slideshow Hero Section -->
    <section class="relative w-full h-[280px] md:h-[420px] rounded-lg overflow-hidden border border-outline-variant/30 mb-6 md:mb-10 bg-surface-dim" id="slideshow-hero"
      onmouseenter="pauseSlideshow()" onmouseleave="resumeSlideshow()">
      <div id="slides-container" class="w-full h-full relative">
        <!-- Rendered dynamically from JS -->
        <div class="w-full h-full flex items-center justify-center text-on-surface-variant">
          Loading connection nodes...
        </div>
      </div>
      <!-- Progress bar indicators -->
      <div id="slideshow-progress" class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-1.5 z-20 w-full max-w-[200px] px-4"></div>
      <!-- Navigation Arrows -->
      <button onclick="prevSlide()" class="absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-background/60 border border-outline-variant/30 hover:border-primary-color/70 flex items-center justify-center text-on-surface hover:text-primary-color transition-all z-20 active:scale-90">
        <span class="material-symbols-outlined text-[20px]">chevron_left</span>
      </button>
      <button onclick="nextSlide()" class="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-background/60 border border-outline-variant/30 hover:border-primary-color/70 flex items-center justify-center text-on-surface hover:text-primary-color transition-all z-20 active:scale-90">
        <span class="material-symbols-outlined text-[20px]">chevron_right</span>
      </button>
    </section>

    <!-- Main Showcase grid -->
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 md:gap-8 items-start">
      
      <!-- Filter toggle button (mobile only) -->
      <div class="lg:col-span-4 -mb-4 lg:hidden">
        <button id="filter-toggle-btn" onclick="toggleFilters()" class="w-full flex items-center justify-between px-4 py-3 bg-surface/50 border border-outline-variant/30 rounded-lg text-on-surface-variant hover:text-primary-color transition-colors">
          <span class="font-display text-xs font-bold uppercase tracking-wider flex items-center gap-2">
            <span class="material-symbols-outlined text-[16px]">filter_alt</span> Filters
          </span>
          <span class="material-symbols-outlined text-[18px] transition-transform duration-300" id="filter-toggle-icon">expand_more</span>
        </button>
      </div>

      <!-- Filters Sidebar (Collapsible on mobile) -->
      <aside id="filters-panel" class="col-span-1 lg:sticky lg:top-24 space-y-5 md:space-y-6 max-h-[80vh] overflow-y-auto pr-2 no-scrollbar hidden lg:block">
        
        <!-- Clean Sidebar Header -->
        <div class="flex justify-between items-center pb-2 border-b border-outline-variant/30">
          <h3 class="font-display text-sm font-bold text-on-surface uppercase tracking-wider">Showcase Filters</h3>
          <button onclick="resetAllFilters()" class="text-[10px] text-on-surface-variant hover:text-primary-color uppercase font-semibold flex items-center gap-0.5">
            <span class="material-symbols-outlined text-[12px]">restart_alt</span> Reset
          </button>
        </div>

        <!-- Price Filter -->
        <div class="bg-surface/50 border border-outline-variant/30 rounded-lg p-4 md:p-5" style="background-color: var(--surface-color);">
          <h4 class="font-display text-xs font-bold text-primary-color mb-3 uppercase tracking-wider">Access Price</h4>
          <div class="flex flex-col gap-3">
            <label class="flex items-center gap-3 cursor-pointer group">
              <input type="checkbox" id="price-free" class="form-checkbox bg-background border-outline-variant/50 text-primary-color rounded focus:ring-primary-color focus:ring-offset-background w-4 h-4"/>
              <span class="font-body text-xs text-on-surface group-hover:text-primary-color transition-colors">Free Distribution</span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer group">
              <input type="checkbox" id="price-paid" class="form-checkbox bg-background border-outline-variant/50 text-primary-color rounded focus:ring-primary-color focus:ring-offset-background w-4 h-4"/>
              <span class="font-body text-xs text-on-surface group-hover:text-primary-color transition-colors">Paid Premium</span>
            </label>
          </div>
        </div>

        <!-- Genre Dropdown Selector -->
        <div class="bg-surface/50 border border-outline-variant/30 rounded-lg p-4 md:p-5" style="background-color: var(--surface-color);">
          <h4 class="font-display text-xs font-bold text-primary-color mb-3 uppercase tracking-wider">Genre Index</h4>
          <select id="genre-filter-select" class="w-full bg-background border border-outline-variant/40 rounded px-3 py-2 text-xs custom-input">
            <option value="all">-- All Genres --</option>
            <!-- Populated from JS -->
          </select>
        </div>

        <!-- Theme Dropdown Selector -->
        <div class="bg-surface/50 border border-outline-variant/30 rounded-lg p-4 md:p-5" style="background-color: var(--surface-color);">
          <h4 class="font-display text-xs font-bold text-secondary-color mb-3 uppercase tracking-wider">Theme Matrix</h4>
          <select id="theme-filter-select" class="w-full bg-background border border-outline-variant/40 rounded px-3 py-2 text-xs custom-input">
            <option value="all">-- All Themes --</option>
            <!-- Populated from JS -->
          </select>
        </div>

      </aside>

      <!-- Games Grid Container -->
      <section class="col-span-1 lg:col-span-3">
        <h3 class="font-display text-xs md:text-sm font-bold uppercase tracking-wider mb-4 md:mb-6 text-on-surface-variant">Available Archives</h3>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6" id="games-grid-container">
          <!-- Loading state -->
          <div class="h-80 rounded-lg border border-outline-variant/30 skeleton"></div>
          <div class="h-80 rounded-lg border border-outline-variant/30 skeleton"></div>
        </div>
      </section>

    </div>
  </main>

  <!-- Back to top -->
  <button onclick="window.scrollTo({top:0,behavior:'smooth'})" id="back-to-top" class="fixed bottom-6 right-6 z-40 w-10 h-10 rounded-full bg-primary-color text-on-primary flex items-center justify-center shadow-lg hover:shadow-[0_0_20px_rgba(78,222,163,0.3)] transition-all duration-300 hover:-translate-y-1 active:scale-90 md:bottom-8 md:right-8" aria-label="Back to top" style="display:none">
    <span class="material-symbols-outlined text-[20px]">arrow_upward</span>
  </button>

  <!-- Footer injected here -->
  <footer id="global-footer"></footer>

  <!-- Scripts -->
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <script src="app.js"></script>
  
  <script>
    // 25 Genres from original taxonomy
    const TAXONOMY_GENRES = [
      "Action", "Action-Adventure", "Adventure", "Arcade", "Battle Royale", 
      "Card & Board", "Casual", "Educational", "Fighting", "FPS / Shooter", 
      "Horror", "MMORPG", "Multiplayer / Co-op", "Open World", "Platformer", 
      "Puzzle", "Racing", "RPG", "RTS", "Sandbox", "Simulation", "Sports", 
      "Strategy", "Survival", "Survival Horror", "Tactical"
    ];

    // 13 Themes from original taxonomy
    const TAXONOMY_THEMES = [
      "Abstract", "Anime", "Cyberpunk", "Fantasy", "Horror", "Medieval", 
      "Military", "Modern", "Post-Apocalyptic", "Retro", "Sci-Fi", "Steampunk", "Supernatural"
    ];

    let currentSlideIdx = 0;
    let slideshowInterval = null;
    let progressAnimationFrame = null;
    let slideStartTime = 0;
    const SLIDE_DURATION = 5000;
    let publicGames = [];

    document.addEventListener("DOMContentLoaded", () => {
      // 1. Populate Dropdown Options
      const genreSelect = document.getElementById("genre-filter-select");
      const themeSelect = document.getElementById("theme-filter-select");

      genreSelect.innerHTML += TAXONOMY_GENRES.map(g => `<option value="${g}">${g}</option>`).join('');
      themeSelect.innerHTML += TAXONOMY_THEMES.map(t => `<option value="${t}">${t}</option>`).join('');

      // Fetch all public games
      publicGames = window.db.getGames().filter(g => g.visibility === 'Public');

      // 2. Setup Slideshow Hero
      initializeSlideshow();

      // 3. Set Event Listeners for Filters
      document.getElementById("search-input").addEventListener("input", performFiltering);
      document.getElementById("price-free").addEventListener("change", performFiltering);
      document.getElementById("price-paid").addEventListener("change", performFiltering);
      genreSelect.addEventListener("change", performFiltering);
      themeSelect.addEventListener("change", performFiltering);

      // Initial Filter Rendering
      performFiltering();
    });

    // Toggle filters panel on mobile
    window.toggleFilters = function() {
      const panel = document.getElementById("filters-panel");
      const icon = document.getElementById("filter-toggle-icon");
      panel.classList.toggle("hidden");
      icon.style.transform = panel.classList.contains("hidden") ? "rotate(0deg)" : "rotate(180deg)";
    };

    // Reset all filters helper
    window.resetAllFilters = function() {
      document.getElementById("search-input").value = "";
      document.getElementById("price-free").checked = false;
      document.getElementById("price-paid").checked = false;
      document.getElementById("genre-filter-select").value = "all";
      document.getElementById("theme-filter-select").value = "all";
      performFiltering();
    };

    // SLIDESHOW LOGIC
    function initializeSlideshow() {
      const slidesContainer = document.getElementById("slides-container");
      const progressContainer = document.getElementById("slideshow-progress");
      
      if (publicGames.length === 0) {
        slidesContainer.innerHTML = `
          <div class="w-full h-full flex items-center justify-center text-on-surface-variant font-display text-sm">
            No active game records available to stream.
          </div>
        `;
        return;
      }

      // Render Slides HTML — all stacked, opacity handles visibility
      slidesContainer.innerHTML = publicGames.map((g, idx) => {
        const priceLabel = g.priceType === 'Free' ? 'FREE' : `₹${g.price}`;
        return `
          <div class="slide-item absolute inset-0 w-full h-full flex items-center cursor-pointer ${idx === 0 ? 'opacity-100' : 'opacity-0 pointer-events-none'}" 
               onclick="goToGameDetails('${g.id}', event)" 
               data-index="${idx}"
               style="transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);">
            
            <!-- Slide Background image -->
            <div class="absolute inset-0 z-0">
              <img src="${g.screenshots[0] || g.thumbnail || 'https://via.placeholder.com/1200x800'}" class="w-full h-full object-cover opacity-25" alt="bg_${g.title}"/>
              <!-- Heavy dark gradient overlay -->
              <div class="absolute inset-0 bg-gradient-to-r from-background via-background/85 to-transparent"></div>
            </div>
            
            <!-- Slide Content Overlay -->
            <div class="relative z-10 max-w-2xl px-6 md:px-8 lg:px-16 space-y-3 md:space-y-4">
              <div class="flex gap-2">
                <span class="bg-primary-color/10 border border-primary-color/20 text-primary-color font-display text-[8px] md:text-[9px] font-bold px-2 py-0.5 rounded uppercase tracking-wider">
                  ${g.genre.split('/')[0].trim()}
                </span>
                <span class="bg-secondary-color/10 border border-secondary-color/20 text-secondary-color font-display text-[8px] md:text-[9px] font-bold px-2 py-0.5 rounded uppercase tracking-wider">
                  ${g.theme.split('/')[0].trim()}
                </span>
              </div>
              <h2 class="font-display text-2xl md:text-3xl lg:text-4xl font-bold text-on-surface text-glow">${g.title}</h2>
              <p class="font-body text-xs md:text-sm text-on-surface-variant leading-relaxed line-clamp-2 md:line-clamp-3 max-w-xl">${g.desc}</p>
              <div class="flex items-center gap-4 pt-1 md:pt-2">
                <span class="font-display font-bold text-primary-color">${priceLabel}</span>
                <a href="game-detail.html?id=${g.id}" class="btn-glow-primary px-4 md:px-5 py-2 md:py-2.5 bg-primary-color text-blue-800 font-display font-bold uppercase tracking-wider text-[9px] md:text-[10px]">
                  View Details →
                </a>
              </div>
            </div>

          </div>
        `;
      }).join('');

      // Render Progress bar indicators
      progressContainer.innerHTML = publicGames.map((_, idx) => `
        <div class="progress-track flex-1 h-[3px] rounded-full bg-white/20 overflow-hidden cursor-pointer" onclick="jumpToSlide(${idx})" data-index="${idx}">
          <div class="progress-fill h-full rounded-full ${idx === 0 ? '' : 'w-0'}" style="background: var(--primary-color); ${idx === 0 ? 'width: 0%' : ''}"></div>
        </div>
      `).join('');

      // Launch automatic slide transitions
      startSlideshowInterval();
    }

    function animateProgressBar() {
      const fills = document.querySelectorAll('.progress-fill');
      if (!fills[currentSlideIdx]) return;

      const elapsed = Date.now() - slideStartTime;
      const progress = Math.min((elapsed / SLIDE_DURATION) * 100, 100);
      fills[currentSlideIdx].style.width = progress + '%';

      if (progress < 100) {
        progressAnimationFrame = requestAnimationFrame(animateProgressBar);
      }
    }

    function startSlideshowInterval() {
      clearInterval(slideshowInterval);
      cancelAnimationFrame(progressAnimationFrame);

      // Reset current progress bar
      const fills = document.querySelectorAll('.progress-fill');
      fills.forEach(f => f.style.width = '0%');
      if (fills[currentSlideIdx]) {
        fills[currentSlideIdx].style.width = '0%';
      }

      slideStartTime = Date.now();
      animateProgressBar();

      slideshowInterval = setInterval(() => {
        nextSlide();
      }, SLIDE_DURATION);
    }

    window.nextSlide = function() {
      if (publicGames.length <= 1) return;
      let nextIdx = (currentSlideIdx + 1) % publicGames.length;
      showSlide(nextIdx);
    };

    window.prevSlide = function() {
      if (publicGames.length <= 1) return;
      let prevIdx = (currentSlideIdx - 1 + publicGames.length) % publicGames.length;
      showSlide(prevIdx);
    };

    window.jumpToSlide = function(idx) {
      showSlide(idx);
    };

    function showSlide(idx) {
      if (idx === currentSlideIdx) return;
      
      const slides = document.querySelectorAll(".slide-item");
      const fills = document.querySelectorAll(".progress-fill");

      // Fade out current slide
      slides[currentSlideIdx].classList.remove("opacity-100");
      slides[currentSlideIdx].classList.add("opacity-0", "pointer-events-none");
      fills[currentSlideIdx].style.width = '0%';

      // Fade in new slide
      currentSlideIdx = idx;
      slides[currentSlideIdx].classList.remove("opacity-0", "pointer-events-none");
      slides[currentSlideIdx].classList.add("opacity-100");

      // Restart timer
      startSlideshowInterval();
    }

    let isPaused = false;
    window.pauseSlideshow = function() {
      isPaused = true;
      clearInterval(slideshowInterval);
      cancelAnimationFrame(progressAnimationFrame);
    };

    window.resumeSlideshow = function() {
      if (!isPaused) return;
      isPaused = false;
      // Resume from where it left off
      const fills = document.querySelectorAll('.progress-fill');
      const currentFill = fills[currentSlideIdx];
      if (!currentFill) return;

      const currentWidth = parseFloat(currentFill.style.width) || 0;
      const remaining = SLIDE_DURATION * (1 - currentWidth / 100);
      slideStartTime = Date.now() - (currentWidth / 100 * SLIDE_DURATION);
      animateProgressBar();
      slideshowInterval = setInterval(() => {
        nextSlide();
      }, remaining);
    };

    window.goToGameDetails = function(id, e) {
      // Prevent click triggering detail navigation when clicking buttons inside slide container
      if (e.target.closest('a') || e.target.closest('button')) {
        return;
      }
      window.location.href = `game-detail.html?id=${id}`;
    };

    // FILTER ENGINE
    function performFiltering() {
      const grid = document.getElementById("games-grid-container");
      grid.innerHTML = "";

      const query = document.getElementById("search-input").value.toLowerCase().trim();
      const freeChecked = document.getElementById("price-free").checked;
      const paidChecked = document.getElementById("price-paid").checked;
      
      const selectedGenre = document.getElementById("genre-filter-select").value;
      const selectedTheme = document.getElementById("theme-filter-select").value;

      // Filter local list
      let filtered = [...publicGames];

      // 1. Text filter
      if (query) {
        filtered = filtered.filter(g => 
          g.title.toLowerCase().includes(query) || 
          g.desc.toLowerCase().includes(query)
        );
      }

      // 2. Price filter
      if (freeChecked || paidChecked) {
        filtered = filtered.filter(g => {
          const isFree = (g.priceType === 'Free' || g.price === '0');
          if (freeChecked && isFree) return true;
          if (paidChecked && !isFree) return true;
          return false;
        });
      }

      // 3. Genre Dropdown filter
      if (selectedGenre !== "all") {
        filtered = filtered.filter(g => g.genre.toLowerCase().includes(selectedGenre.toLowerCase()));
      }

      // 4. Theme Dropdown filter
      if (selectedTheme !== "all") {
        filtered = filtered.filter(g => g.theme.toLowerCase().includes(selectedTheme.toLowerCase()));
      }

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="col-span-2 text-center py-16 text-on-surface-variant border border-outline-variant/30 rounded-lg p-6 w-full" style="background-color: var(--surface-color);">
            <span class="material-symbols-outlined text-[48px] text-outline opacity-40 mb-3">database_off</span>
            <p class="font-display font-medium text-lg text-on-surface">No Matches Found</p>
            <p class="text-xs text-on-surface-variant/80 mt-1">Adjust search parameters or select different dropdown values.</p>
          </div>
        `;
        return;
      }

      filtered.forEach(g => {
        const card = document.createElement("article");
        card.className = "corner-bracket bg-surface border border-outline-variant/20 overflow-hidden group hover:border-primary-color/30 transition-all duration-500 relative flex flex-col h-full";
        card.style.backgroundColor = "var(--surface-color)";

        const priceLabel = g.priceType === 'Free' ? 'FREE' : `₹${g.price}`;

        card.innerHTML = `
          <div class="absolute top-0 left-0 w-full h-px bg-primary-color scale-x-0 group-hover:scale-x-100 transition-transform origin-left z-10"></div>
          <div class="h-40 md:h-48 overflow-hidden relative bg-black/40">
            <img src="${g.thumbnail || 'https://via.placeholder.com/600x400'}" alt="${g.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 opacity-70 group-hover:opacity-100"/>
            <div class="absolute top-3 right-3 bg-background/85 border border-outline-variant/40 text-primary-color font-display text-[9px] font-bold px-2 py-0.5 uppercase tracking-wider backdrop-blur-sm">
              ${g.genre.split('/')[0].trim()}
            </div>
          </div>
          <div class="p-4 md:p-5 flex flex-col flex-grow">
            <div class="flex items-center justify-between mb-2 md:mb-3">
              <span class="text-secondary-color font-display text-[8px] md:text-[9px] font-bold uppercase tracking-[0.15em]">${g.theme.split('/')[0].trim()}</span>
              <span class="text-primary-color font-display text-[10px] md:text-xs font-bold bg-primary-color/10 px-2 py-0.5">${priceLabel}</span>
            </div>
            <h3 class="font-display text-base md:text-lg font-bold text-on-surface group-hover:text-primary-color transition-colors duration-300 mb-1 md:mb-2">${g.title}</h3>
            <p class="font-body text-xs text-on-surface-variant line-clamp-2 md:line-clamp-3 mb-3 md:mb-5 flex-grow leading-relaxed font-light">${g.desc}</p>
            <a href="game-detail.html?id=${g.id}" class="btn-glow-primary w-full py-2 md:py-2.5 bg-surface-bright/40 text-on-surface border border-outline-variant/30 font-display text-[9px] md:text-[10px] font-semibold uppercase text-center transition-all duration-300 group-hover:bg-primary-color group-hover:text-on-primary group-hover:border-primary-color">
              Explore →
            </a>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // Back to top button visibility
    const backBtn = document.getElementById("back-to-top");
    if (backBtn) {
      window.addEventListener("scroll", () => {
        backBtn.style.display = window.scrollY > 300 ? "flex" : "none";
      });
    }
  </script>
</body>
</html>
