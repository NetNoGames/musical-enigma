<!-- LOGIN SYSTEM -->

<div id="loginOverlay" class="login-frame-mask">

  <div class="login-terminal-box">

    <div class="close-terminal-btn"
    onclick="closeLoginPanel()">
    ×
    </div>

    <h2 class="login-title">
    Developer Portal
    </h2>

    <!-- GOOGLE LOGIN -->

    <button class="google-sso-btn"
    onclick="googleLogin()">

    Continue With Google

    </button>

    <div class="divider">OR</div>

    <!-- LOGIN FORM -->

    <form id="loginForm"
    onsubmit="emailLogin(event)">

      <div class="terminal-input-row">

        <label>Email</label>

        <input
        type="email"
        id="loginEmail"
        required>

      </div>

      <div class="terminal-input-row">

        <label>Password</label>

        <input
        type="password"
        id="loginPassword"
        required>

      </div>

      <button type="submit"
      class="terminal-submit-btn">

      Login

      </button>

    </form>

    <!-- REGISTER AFTER GOOGLE -->

    <div id="setupBox"
    style="display:none;">

      <div class="terminal-input-row">

        <label>Username</label>

        <input
        type="text"
        id="setupUsername">

      </div>

      <div class="terminal-input-row">

        <label>Password</label>

        <input
        type="password"
        id="setupPassword">

      </div>

      <button
      class="terminal-submit-btn"
      onclick="finishGoogleSetup()">

      Complete Account

      </button>

    </div>

    <div id="loginError"
    class="terminal-alert-msg">
    </div>

  </div>

</div>
