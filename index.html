<!-- STEAM CREATE GAME PANEL -->

<div id="createGameOverlay"
class="sub-panel-overlay"
style="display:none;"
onclick="if(event.target.id==='createGameOverlay') closeCreateGamePanel();">

  <div class="game-create-box">

    <div class="game-create-header">
      <h2>Create Game Page</h2>
      <span onclick="closeCreateGamePanel()">×</span>
    </div>

    <div class="game-create-body">

      <div class="terminal-input-row">
        <label>Game Name</label>
        <input type="text"
        id="gameNameInput"
        placeholder="Enter game name">
      </div>

      <div class="terminal-input-row">
        <label>Short Description</label>

        <textarea
        id="gameDescInput"
        rows="6"
        placeholder="Describe your game..."
        style="
        width:100%;
        background:#111822;
        border:1px solid #2a3d55;
        border-radius:8px;
        color:white;
        padding:15px;
        box-sizing:border-box;
        resize:none;"></textarea>
      </div>

      <div class="terminal-input-row">
        <label>Trailer URL</label>

        <input type="text"
        id="gameTrailerInput"
        placeholder="https://youtube.com/...">
      </div>

      <div class="terminal-input-row">
        <label>Game Banner</label>
        <input type="file"
        id="gameBannerInput"
        accept="image/*">
      </div>

      <div class="terminal-input-row">
        <label>Screenshot 1</label>
        <input type="file"
        id="gameSS1"
        accept="image/*">
      </div>

      <div class="terminal-input-row">
        <label>Screenshot 2</label>
        <input type="file"
        id="gameSS2"
        accept="image/*">
      </div>

      <div class="terminal-input-row">
        <label>Screenshot 3</label>
        <input type="file"
        id="gameSS3"
        accept="image/*">
      </div>

      <button
      class="terminal-submit-btn"
      onclick="publishGamePage()">
      Publish Game
      </button>

    </div>

  </div>

</div>

<!-- YOUR GAMES -->

<div id="yourGamesOverlay"
class="sub-panel-overlay"
style="display:none;"
onclick="if(event.target.id==='yourGamesOverlay') closeYourGamesPanel();">

  <div class="your-games-box">

    <div class="game-create-header">
      <h2>Your Games</h2>
      <span onclick="closeYourGamesPanel()">×</span>
    </div>

    <div id="gamesContainer"
    class="games-container"></div>

  </div>

</div>

<!-- BUTTONS -->

<button onclick="openCreateGamePanel()"
style="
width:100%;
padding:12px;
background:#111822;
border:1px solid #304760;
color:white;
margin-bottom:10px;
cursor:pointer;
text-align:left;
font-weight:bold;
border-radius:8px;">
Create Game ID
</button>

<button onclick="openYourGamesPanel()"
style="
width:100%;
padding:12px;
background:#111822;
border:1px solid #304760;
color:white;
margin-bottom:10px;
cursor:pointer;
text-align:left;
font-weight:bold;
border-radius:8px;">
Your Games
</button>
