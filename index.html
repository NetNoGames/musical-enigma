<div id="accountTypeStep" style="display: none; text-align: center;">
  <p style="color: #888; margin-bottom: 15px;">Select Registration Node Mode:</p>
  <button type="button" class="terminal-submit-btn" style="margin-bottom: 10px;" onclick="selectAccountType('individual')">Individual Account</button>
  <button type="button" class="terminal-submit-btn" style="background: #232330;" onclick="selectAccountType('organization')">Organization Account</button>
</div>

<div id="orgCredentialsStep" style="display: none;">
  <div class="terminal-input-row">
    <label>Company Name (Main Profile Identifier)</label>
    <input type="text" id="orgCompanyName" placeholder="Enter registration company name...">
  </div>
  <div class="terminal-input-row">
    <label>Company Owner Name</label>
    <input type="text" id="orgOwnerName" placeholder="Enter owner full name...">
  </div>
  <div class="terminal-input-row">
    <label>Phone Number</label>
    <input type="text" id="orgPhone" placeholder="Enter communication link contact...">
  </div>
  <div class="terminal-input-row">
    <label>Email Address</label>
    <input type="email" id="orgEmail" placeholder="Enter business email...">
  </div>
  <div class="terminal-input-row">
    <label>Website Link (Optional)</label>
    <input type="text" id="orgWebsite" placeholder="www.yourcompany.com">
  </div>
  <div class="terminal-input-row">
    <label>Set Security Key Password (For Login & Deletion)</label>
    <input type="password" id="orgPasswordInput" placeholder="Set password...">
  </div>
  <button type="button" class="terminal-submit-btn" onclick="submitOrgCredentialsStep()">Continue to Avatar</button>
</div>
