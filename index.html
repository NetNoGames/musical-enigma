<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetNo Games</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menuBtn" onclick="toggleMenu()">☰</div>

<div id="sidebar">
  <button onclick="openPanel('overviewinfo.png', false)">Overview</button>
  <button onclick="openPanel('developerportal.png', false)">Portal</button>
  <button onclick="openPanel('supportpanel.png', false)">Support</button>
  <button onclick="openPanel('communitypanels.png', true)">Community</button>
  <button onclick="openPanel('games.png', false)">Games</button>
</div>

<div class="hero"></div>

<div class="btn download" id="downloadBtn" onclick="downloadLauncher()">Download Game</div>
<div class="btn portal" id="portalBtn" onclick="openPanel('developerportal.png', false)">Developer Portal</div>

<div id="panel">
  <div class="panel-content-wrapper">
    <img id="panelImg" alt="NetNo Games Panel">
    
    <div id="communityLinks" class="community-overlay">
      <a href="https://discord.gg/PTbxu9nPZq" target="_blank" class="action-btn">Discord Server</a>
      <a href="https://www.reddit.com/r/NetNoGamesCommunity/s/VMGdDDwaQU" target="_blank" class="action-btn">Subreddit</a>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
