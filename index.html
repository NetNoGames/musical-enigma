<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetNo Games</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menuBtn" onclick="toggleMenu()">☰</div>

<div id="sidebar">
  <button onclick="openPanel('overviewinfo.png', false)">Overview</button>
  <button onclick="openLoginPanel()">Portal</button>
  <button onclick="openPanel('supportpanel.png', false)">Support</button>
  <button onclick="openPanel('communitypanels.png', true)">Community</button>
  <button onclick="openPanel('games.png', false)">Games</button>
</div>

<div class="hero"></div>

<div class="btn download" id="downloadBtn" onclick="downloadLauncher()">Download Game</div>
<div class="btn portal" id="portalBtn" onclick="openLoginPanel()">Developer Portal</div>

<div id="panel" onclick="closePanelOnOverlay(event)">
  <div class="panel-content-wrapper">
    <img id="panelImg" alt="Panel Content">
    
    <div id="communityLinks" class="community-overlay">
      <a href="https://discord.gg/PTbxu9nPZq" target="_blank" class="action-btn">Discord Server</a>
      <a href="https://www.reddit.com/r/NetNoGamesCommunity/s/VMGdDDwaQU" target="_blank" class="action-btn">Subreddit</a>
    </div>
  </div>
</div>

<div id="loginOverlay" class="login-frame-mask">
  <div class="login-terminal-box">
    <div class="close-terminal-btn" onclick="closeLoginPanel()">×</div>
    <h3 id="authBoxTitle">Developer Terminal</h3>
    
    <button id="googleAuthBtn" class="google-sso-btn" onclick="handleGoogleAuth()">
      <img src="https://cdns.iconmonstr.com/wp-content/releases/preview/2012/png/iconmonstr-google-plus-1.png" style="width:16px; height:16px; filter:invert(1);" alt="G">
      Continue with Google
    </button>

    <div id="authSeparator" class="form-divider-row"><span>OR</span></div>

    <form id="emailFormView" data-mode="login" onsubmit="handleEmailAuth(event)">
      <div class="terminal-input-row">
        <label>Account Mail Identity</label>
        <input type="email" id="authEmail" required placeholder="name@netnogames.com">
      </div>
      <div class="terminal-input-row">
        <label>Access Protection Key</label>
        <input type="password" id="authPassword" required placeholder="Password configuration...">
      </div>
      <button type="submit" id="emailSubmitBtn" class="terminal-submit-btn">Verify Access</button>
    </form>

    <form id="usernameSetupView" style="display:none;" onsubmit="handleUsernameSubmission(event)">
      <div class="terminal-input-row">
        <label>Choose Developer Username</label>
        <input type="text" id="profileUsername" required placeholder="Enter unique tag...">
      </div>
      <button type="submit" class="terminal-submit-btn">Save & Initialize Portal</button>
    </form>

    <div id="loginError" class="terminal-alert-msg"></div>
    
    <div id="toggleAuthText" class="view-switch-footer">
      New Developer? <span onclick="toggleAuthView('register')">Create Account</span>
    </div>
  </div>
</div>
<script type="module" src="portal-auth.js"></script>
<script src="script.js"></script>
</body>
</html>
