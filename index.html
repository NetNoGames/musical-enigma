<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetNo Games</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="menuBtn" onclick="toggleMenu()">☰</div>

<div id="sidebar">
  <button onclick="openPanel('overviewinfo.png', false)">Overview</button>

  <button onclick="openLoginPanel()">Portal</button>

  <button onclick="openPanel('supportpanel.png', false)">Support</button>

  <button onclick="openPanel('communitypanels.png', true)">Community</button>

  <button onclick="openPanel('games.png', false)">Games</button>
</div>

<div class="hero"></div>

<div class="btn download" id="downloadBtn" onclick="downloadLauncher()">
Download Game
</div>

<div class="btn portal" id="portalBtn" onclick="openLoginPanel()">
Developer Portal
</div>

<div id="panel" onclick="closePanelOnOverlay(event)">
  <div class="panel-content-wrapper">

    <img id="panelImg" alt="Panel Content">

    <div id="communityLinks" class="community-overlay">

      <a href="https://discord.gg/PTbxu9nPZq"
      target="_blank"
      class="action-btn">
      Discord Server
      </a>

      <a href="https://www.reddit.com/r/NetNoGamesCommunity/s/VMGdDDwaQU"
      target="_blank"
      class="action-btn">
      Subreddit
      </a>

    </div>

  </div>
</div>

<!-- LOGIN PANEL -->

<div id="loginOverlay" class="login-frame-mask">

  <div class="login-terminal-box">

    <div class="close-terminal-btn"
    onclick="closeLoginPanel()">
    ×
    </div>

    <h2 class="login-title">
    Developer Portal
    </h2>

    <!-- GOOGLE LOGIN -->

    <button class="google-sso-btn"
    onclick="handleGoogleAuth()">

    Continue With Google

    </button>

    <div class="divider">
      <span>OR</span>
    </div>

    <!-- EMAIL LOGIN -->

    <form id="authForm">

      <div class="terminal-input-row">

        <label>Email</label>

        <input
        type="email"
        id="authEmail"
        required>

      </div>

      <div class="terminal-input-row">

        <label>Password</label>

        <input
        type="password"
        id="authPassword"
        required>

      </div>

      <button type="submit"
      class="terminal-submit-btn">

      Login / Register

      </button>

    </form>

    <!-- USERNAME -->

    <div id="usernameSection"
    style="display:none;">

      <div class="terminal-input-row">

        <label>Choose Username</label>

        <input
        type="text"
        id="usernameInput">

      </div>

      <button
      class="terminal-submit-btn"
      onclick="saveUsername()">

      Continue

      </button>

    </div>

    <div id="loginError"
    class="terminal-alert-msg">
    </div>

  </div>

</div>

<script type="module" src="portallogin.js"></script>

<script src="script.js"></script>

</body>
</html>
