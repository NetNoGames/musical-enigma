<div id="tabView-terminate_hub" class="settings-tab-content" style="display: none;">
  <h3 style="color:#ff3333; margin-top:0;">Danger Zone: Account Deletion</h3>
  <p style="color:#888; font-size:13px; line-height:1.5;">This action will permanently erase your developer profile data node structure from NetNo Games platform. Enter password to authorize node destruction.</p>
  
  <div class="terminal-input-row">
    <label>Profile Validation Password</label>
    <input type="password" id="deleteAccountPassword" placeholder="Enter registration security key...">
  </div>

  <button class="terminal-submit-btn" style="background:#ff3333; margin-bottom: 15px;" onclick="applySettingsAccountTermination()">Authorize Account Destruction</button>
  
  <div style="text-align: center;">
    <span onclick="triggerResetKeyForDeletion()" style="color: #00aaff; font-size: 13px; cursor: pointer; text-decoration: underline; letter-spacing: 0.5px;">
      Forgot Password? Reset via Email
    </span>
  </div>
</div>
