<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetNo Games</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Modern X / Corporate Hybrid Modal Dynamic Viewport System */
  .settings-overlay, .sub-panel-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
    background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); z-index: 4000;
    justify-content: center; align-items: center;
  }
  .settings-box {
    width: 90%; max-width: 450px; background: #000000; border: 1px solid #2f3336;
    border-radius: 16px; display: flex; flex-direction: column; height: 75vh; overflow: hidden;
  }
  .settings-header { 
    display: flex; justify-content: space-between; align-items: center;
    padding: 15px 20px; border-bottom: 1px solid #2f3336; color: #fff; font-weight: bold; font-size: 18px;
  }
  .settings-body-vertical {
    display: flex; flex-direction: column; flex: 1; overflow-y: auto; padding: 10px 0;
  }
  .x-menu-btn {
    background: none; border: none; color: #e7e9ea; padding: 16px 20px; text-align: left;
    cursor: pointer; font-size: 15px; font-weight: bold; transition: 0.2s; border-bottom: 1px solid #16181c;
  }
  .x-menu-btn:hover { background: rgba(255, 255, 255, 0.08); }
  .x-menu-btn-danger { color: #f4212e; }
  .x-menu-btn-danger:hover { background: rgba(244, 33, 46, 0.1); }
  
  .sub-panel-box {
    width: 90%; max-width: 420px; background: #000000; border: 1px solid #2f3336;
    border-radius: 16px; padding: 25px; color: white; box-sizing: border-box;
    position: relative;
  }
  .sub-panel-box h3 { margin-top: 0; margin-bottom: 20px; font-size: 18px; color: #fff; }
  .char-counter { font-size: 12px; color: #71767b; text-align: right; margin-top: 4px; display: block; }

  /* Re-engineered Button Portals */
  .individual-sso-btn {
    width: 100%; padding: 12px; background: #00aaff; color: white; border: none;
    border-radius: 5px; cursor: pointer; font-size: 15px; font-weight: bold;
    margin-bottom: 12px; transition: 0.2s ease; text-align: center;
  }
  .individual-sso-btn:hover { background: #0088cc; transform: scale(1.02); }

  .organization-sso-btn {
    width: 100%; padding: 12px; background: #111; color: #00aaff; border: 1px solid #00aaff;
    border-radius: 5px; cursor: pointer; font-size: 15px; font-weight: bold;
    margin-bottom: 20px; transition: 0.2s ease; text-align: center;
  }
  .organization-sso-btn:hover { background: rgba(0, 170, 255, 0.1); transform: scale(1.02); }

  .approval-status-box { text-align: center; padding: 20px; color: white; }
  .approval-status-box h3 { color: #ffcc00; font-size: 22px; margin-bottom: 15px; }
  .approval-status-box p { color: #aaa; font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>

<div id="userProfileHeader" onclick="toggleUserMenu()" style="display: none; position: fixed; top: 15px; left: 15px; z-index: 2000; cursor: pointer;">
  <img id="headerProfilePic" src="" alt="Profile" style="width: 50px; height: 50px; border-radius: 50%; border: 2px solid #00aaff; object-fit: cover;">
</div>

<div id="menuBtn" onclick="toggleMenu()">☰</div>

<div id="sidebar">
  <button onclick="openPanel('overviewinfo.png', false)">Overview</button>
  <button onclick="openLoginPanel()">Portal</button>
  <button onclick="openPanel('supportpanel.png', false)">Support</button>
  <button onclick="openPanel('communitypanels.png', true)">Community</button>
  <button onclick="openPanel('games.png', false)">Games</button>
</div>

<div id="userSidebar" style="position: fixed; left: -260px; top: 0; width: 260px; height: 100%; background: #0b0c10; border-right: 2px solid #00aaff; transition: 0.3s ease; z-index: 1500; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; color: white;">
  <div class="user-sidebar-profile" style="text-align: center; margin-bottom: 30px;">
    <img id="userSidebarPic" src="" alt="Profile" style="width: 80px; height: 80px; border-radius: 50%; border: 3px solid #00aaff; object-fit: cover; margin-bottom: 10px;">
    <h3 id="userSidebarName" style="margin: 0; font-size: 18px; color: white;">Developer</h3>
  </div>
  
  <button onclick="alert('Create Game ID Clicked')" style="width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: white; margin-bottom: 10px; cursor: pointer; text-align: left; font-weight: bold; border-radius: 5px;">Create Game ID</button>
  <button onclick="alert('Your Games Clicked')" style="width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: white; margin-bottom: 10px; cursor: pointer; text-align: left; font-weight: bold; border-radius: 5px;">Your Games</button>
  <button onclick="openSettingsModal()" style="width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: white; margin-bottom: auto; cursor: pointer; text-align: left; font-weight: bold; border-radius: 5px;">Settings</button>
  
  <button onclick="handleLogout()" class="logout-btn" style="width: 100%; padding: 12px; background: #ff3333; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s;">Logout</button>
</div>

<div class="hero"></div>

<div class="btn download" id="downloadBtn" onclick="downloadLauncher()">Download Game</div>
<div class="btn portal" id="portalBtn" onclick="openLoginPanel()">Developer Portal</div>

<div id="panel" onclick="closePanelOnOverlay(event)">
  <div class="panel-content-wrapper">
    <img id="panelImg" alt="Panel Content">
    <div id="communityLinks" class="community-overlay">
      <a href="https://discord.gg/PTbxu9nPZq" target="_blank" class="action-btn">Discord Server</a>
      <a href="https://www.reddit.com/r/NetNoGamesCommunity/s/VMGdDDwaQU" target="_blank" class="action-btn">Subreddit</a>
    </div>
  </div>
</div>

<div id="loginOverlay" class="login-frame-mask">
  <div class="login-terminal-box" style="max-height: 90vh; overflow-y: auto;">
    <div class="close-terminal-btn" onclick="closeLoginPanel()">×</div>
    <h2 class="login-title">Developer Portal</h2>
    
    <div id="authGateways">
      <button class="individual-sso-btn" onclick="triggerRouteAuth('individual')">Individual</button>
      <button class="organization-sso-btn" onclick="triggerRouteAuth('organization')">Organization</button>
      <div class="divider"><span>OR DIRECT LOGIN</span></div>
      <form id="authForm" onsubmit="handleDirectLogin(event)">
        <div class="terminal-input-row">
          <label>Email Address</label>
          <input type="email" id="authEmail" required>
        </div>
        <div class="terminal-input-row">
          <label>Password</label>
          <input type="password" id="authPassword" required>
        </div>
        <button type="submit" class="terminal-submit-btn">Login</button>
      </form>
    </div>

    <div id="credentialsStep" style="display: none;">
      <h4 style="color: #00aaff; margin-top: 0; margin-bottom: 15px;">Individual Setup</h4>
      <div class="terminal-input-row">
        <label>Choose Username (Max 15 Characters)</label>
        <input type="text" id="usernameInput" maxlength="15" placeholder="Enter custom username...">
      </div>
      <div class="terminal-input-row">
        <label>Set Account Password (Used for Login & Deletion)</label>
        <input type="password" id="setupPasswordInput" placeholder="Set secure account password...">
      </div>
      <button type="button" class="terminal-submit-btn" onclick="submitCredentialsStep()">Continue to Profile Pic</button>
    </div>

    <div id="orgCredentialsStep" style="display: none;">
      <h4 style="color: #00aaff; margin-top: 0; margin-bottom: 15px;">Organization Parameters</h4>
      <div class="terminal-input-row">
        <label>1. Company Name</label>
        <input type="text" id="orgCompanyName" placeholder="Enter studio or firm name...">
      </div>
      <div class="terminal-input-row">
        <label>2. Company Owner Name</label>
        <input type="text" id="orgOwnerName" placeholder="Enter registered owner name...">
      </div>
      <div class="terminal-input-row">
        <label>3. Tax ID</label>
        <input type="text" id="orgTaxId" placeholder="Enter company official Tax ID...">
      </div>
      <div class="terminal-input-row">
        <label>4. Contact Phone Number</label>
        <input type="text" id="orgPhone" placeholder="Enter corporate telephone link...">
      </div>
      <div class="terminal-input-row">
        <label>5. Contact Email Address</label>
        <input type="email" id="orgEmail" placeholder="corporate-contact@domain.com">
      </div>
      <button type="button" class="terminal-submit-btn" onclick="submitOrgCredentialsStep()">Continue</button>
    </div>
