<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetNo Games</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="userProfileHeader" onclick="toggleUserMenu()" style="display: none; position: fixed; top: 15px; left: 15px; z-index: 2000; cursor: pointer;">
  <img id="headerProfilePic" src="" alt="Profile" style="width: 50px; height: 50px; border-radius: 50%; border: 2px solid #00aaff; object-fit: cover;">
</div>

<div id="menuBtn" onclick="toggleMenu()">☰</div>

<div id="sidebar">
  <button onclick="openPanel('overviewinfo.png', false)">Overview</button>
  <button onclick="openLoginPanel()">Portal</button>
  <button onclick="openPanel('supportpanel.png', false)">Support</button>
  <button onclick="openPanel('communitypanels.png', true)">Community</button>
  <button onclick="openPanel('games.png', false)">Games</button>
</div>

<div id="userSidebar" style="position: fixed; left: -260px; top: 0; width: 260px; height: 100%; background: #0b0c10; border-right: 2px solid #00aaff; transition: 0.3s ease; z-index: 1999; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column;">
  <div class="user-sidebar-profile" style="text-align: center; margin-bottom: 30px;">
    <img id="userSidebarPic" src="" alt="Profile" style="width: 90px; height: 90px; border-radius: 50%; border: 3px solid #00aaff; object-fit: cover; margin-bottom: 10px;">
    <h3 id="userSidebarName" style="color: white; margin: 0;">Developer</h3>
  </div>
  <button onclick="alert('Create Game ID Clicked')" style="width: 100%; padding: 12px; background: none; border: none; color: white; text-align: left; font-size: 16px; cursor: pointer; border-bottom: 1px solid #1f2833;">Create Game ID</button>
  <button onclick="alert('Your Games Clicked')" style="width: 100%; padding: 12px; background: none; border: none; color: white; text-align: left; font-size: 16px; cursor: pointer; border-bottom: 1px solid #1f2833; margin-bottom: auto;">Your Games</button>
  
  <button onclick="handleLogout()" class="logout-btn" style="width: 100%; padding: 12px; background: #ff3333; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s;">Logout</button>
</div>

<div class="hero"></div>

<div class="btn download" id="downloadBtn" onclick="downloadLauncher()">Download Game</div>
<div class="btn portal" id="portalBtn" onclick="openLoginPanel()">Developer Portal</div>

<div id="panel" onclick="closePanelOnOverlay(event)">
  <div class="panel-content-wrapper">
    <img id="panelImg" alt="Panel Content">
    <div id="communityLinks" class="community-overlay">
      <a href="https://discord.gg/PTbxu9nPZq" target="_blank" class="action-btn">Discord Server</a>
      <a href="https://www.reddit.com/r/NetNoGamesCommunity/s/VMGdDDwaQU" target="_blank" class="action-btn">Subreddit</a>
    </div>
  </div>
</div>

<div id="loginOverlay" class="login-frame-mask">
  <div class="login-terminal-box">
    <div class="close-terminal-btn" onclick="closeLoginPanel()">×</div>
    <h2 class="login-title">Developer Portal</h2>

    <div id="authGateways">
      <button class="google-sso-btn" onclick="handleGoogleAuth()">
        Continue With Google
      </button>
      <div class="divider"><span>OR</span></div>
      <form id="authForm" onsubmit="handleEmailSubmission(event)">
        <div class="terminal-input-row">
          <label>Email Address</label>
          <input type="email" id="authEmail" required>
        </div>
        <div class="terminal-input-row">
          <label>Password</label>
          <input type="password" id="authPassword" required>
        </div>
        <button type="submit" class="terminal-submit-btn">Login / Register</button>
      </form>
    </div>

    <div id="credentialsStep" style="display: none;">
      <div class="terminal-input-row">
        <label>Choose Username (Max 15 Characters)</label>
        <input type="text" id="usernameInput" maxlength="15" placeholder="Enter username...">
      </div>
      <div class="terminal-input-row">
        <label>Set Account Password (For Future Direct Email/Password Login)</label>
        <input type="password" id="setupPasswordInput" placeholder="Enter password...">
      </div>
      <button type="button" class="terminal-submit-btn" onclick="submitCredentialsStep()">Continue to Avatar</button>
    </div>

    <div id="avatarStep" style="display: none;">
      <div class="terminal-input-row">
        <label style="display: block; margin-bottom: 12px;">Select Profile Picture</label>
        <input type="file" id="avatarFileInput" accept="image/*" style="background: none; border: none; color: white;">
      </div>
      <button type="button" class="terminal-submit-btn" onclick="finalizeAccountRegistration()">Complete Registration</button>
    </div>

    <div id="loginError" class="terminal-alert-msg"></div>
  </div>
</div>

<script type="module" src="portallogin.js"></script>
<script src="script.js"></script>
</body>
</html>
