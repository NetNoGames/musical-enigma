<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetNo Games</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="userProfileHeader" onclick="toggleUserMenu()" style="display: none;">
  <img id="headerProfilePic" src="" alt="Profile">
</div>

<div id="menuBtn" onclick="toggleMenu()">☰</div>

<div id="sidebar">
  <button onclick="openPanel('overviewinfo.png', false)">Overview</button>
  <button onclick="openLoginPanel()">Portal</button>
  <button onclick="openPanel('supportpanel.png', false)">Support</button>
  <button onclick="openPanel('communitypanels.png', true)">Community</button>
  <button onclick="openPanel('games.png', false)">Games</button>
</div>

<div id="userSidebar">
  <div class="user-sidebar-profile">
    <img id="userSidebarPic" src="" alt="Profile">
    <h3 id="userSidebarName">Developer</h3>
  </div>
  <button onclick="alert('Create Game ID Clicked')">Create Game ID</button>
  <button onclick="alert('Your Games Clicked')">Your Games</button>
  <button onclick="handleLogout()" class="logout-btn">Logout</button>
</div>

<div class="hero"></div>

<div class="btn download" id="downloadBtn" onclick="downloadLauncher()">Download Game</div>
<div class="btn portal" id="portalBtn" onclick="openLoginPanel()">Developer Portal</div>

<div id="panel" onclick="closePanelOnOverlay(event)">
  <div class="panel-content-wrapper">
    <img id="panelImg" alt="Panel Content">
    
    <div id="communityLinks" class="community-overlay">
      <a href="https://discord.gg/PTbxu9nPZq" target="_blank" class="action-btn">Discord Server</a>
      <a href="https://www.reddit.com/r/NetNoGamesCommunity/s/VMGdDDwaQU" target="_blank" class="action-btn">Subreddit</a>
    </div>
  </div>
</div>

<div id="loginOverlay" class="login-frame-mask">
  <div class="login-terminal-box">
    <div class="close-terminal-btn" onclick="closeLoginPanel()">×</div>
    <h2 class="login-title">Developer Portal</h2>

    <button id="googleAuthBtn" class="google-sso-btn" onclick="handleGoogleAuth()">
      Continue With Google
    </button>

    <div id="authSeparator" class="divider">
      <span>OR</span>
    </div>

    <form id="authForm">
      <div class="terminal-input-row">
        <label>Email</label>
        <input type="email" id="authEmail" required>
      </div>
      <div class="terminal-input-row">
        <label>Password</label>
        <input type="password" id="authPassword" required>
      </div>
      <button type="submit" class="terminal-submit-btn">Login / Register</button>
    </form>

    <div id="usernameSection" style="display:none;">
      <div class="terminal-input-row">
        <label>Choose Username</label>
        <input type="text" id="usernameInput">
      </div>
      <div class="terminal-input-row" id="setupPasswordRow" style="display:none;">
        <label>Set Account Password</label>
        <input type="password" id="usernamePasswordInput">
      </div>
      <div class="terminal-input-row">
        <label>Upload Profile Picture</label>
        <input type="file" id="profilePicInput" accept="image/*" class="file-input">
      </div>
      <button class="terminal-submit-btn" onclick="saveUsername()">Continue</button>
    </div>

    <div id="loginError" class="terminal-alert-msg"></div>
  </div>
</div>

<script type="module" src="portallogin.js"></script>
<script src="script.js"></script>
</body>
</html>
