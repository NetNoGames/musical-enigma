<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetNo Games</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Clean & Original Settings Overlay Theme Mapped Back */
  .settings-overlay {
    display: none; position: fixed; top:0; left:0; width:100%; height:100vh;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 4000;
    justify-content: center; align-items: center;
  }
  .settings-box {
    width: 90%; max-width: 500px; background: #0b0c10; border: 2px solid #00aaff;
    border-radius: 8px; display: flex; flex-direction: column; height: 70vh; overflow: hidden;
  }
  .settings-header { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #1f2833; color: #00aaff; font-weight: bold; }
  .settings-body { display: flex; flex: 1; overflow: hidden; }
  .settings-sidebar { width: 30%; background: #1f2833; display: flex; flex-direction: column; border-right: 1px solid #00aaff; }
  .settings-nav-btn { background: none; border: none; color: #fff; padding: 12px; text-align: left; cursor: pointer; font-size: 13px; }
  .settings-nav-btn.active, .settings-nav-btn:hover { background: #00aaff; color: black; font-weight: bold; }
  .settings-content { width: 70%; padding: 20px; overflow-y: auto; color: white; }
  .sub-nav { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 8px; }
  .sub-nav-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 12px; }
  .sub-nav-btn.active { color: #00aaff; font-weight: bold; }
</style>
</head>
<body>

<div id="userProfileHeader" onclick="toggleUserMenu()" style="display: none; position: fixed; top: 15px; left: 15px; z-index: 2000; cursor: pointer;">
  <img id="headerProfilePic" src="" alt="Profile" style="width: 50px; height: 50px; border-radius: 50%; border: 2px solid #00aaff; object-fit: cover;">
</div>

<div id="menuBtn" onclick="toggleMenu()">☰</div>

<div id="sidebar">
  <button onclick="openPanel('overviewinfo.png', false)">Overview</button>
  <button onclick="openLoginPanel()">Portal</button>
  <button onclick="openPanel('supportpanel.png', false)">Support</button>
  <button onclick="openPanel('communitypanels.png', true)">Community</button>
  <button onclick="openPanel('games.png', false)">Games</button>
</div>

<div id="userSidebar" style="position: fixed; left: -260px; top: 0; width: 260px; height: 100%; background: #0b0c10; border-right: 2px solid #00aaff; transition: 0.3s ease; z-index: 1999; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column;">
  <div class="user-sidebar-profile" style="text-align: center; margin-bottom: 20px;">
    <img id="userSidebarPic" src="" alt="Profile" style="width: 90px; height: 90px; border-radius: 50%; border: 3px solid #00aaff; object-fit: cover; margin-bottom: 10px;">
    <h3 id="userSidebarName" style="color: white; margin: 0;">Developer</h3>
  </div>
  
  <button onclick="alert('Create Game ID Clicked')" style="width: 100%; padding: 12px; background: none; border: none; color: white; text-align: left; font-size: 16px; cursor: pointer; border-bottom: 1px solid #1f2833;">Create Game ID</button>
  <button onclick="alert('Your Games Clicked')" style="width: 100%; padding: 12px; background: none; border: none; color: white; text-align: left; font-size: 16px; cursor: pointer; border-bottom: 1px solid #1f2833;">Your Games</button>
  
  <button onclick="openSettingsModal()" style="width: 100%; padding: 12px; background: none; border: none; color: white; text-align: left; font-size: 16px; cursor: pointer; border-bottom: 1px solid #1f2833; margin-bottom: auto;">Settings</button>
  
  <button onclick="handleLogout()" class="logout-btn" style="width: 100%; padding: 12px; background: #ff3333; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s;">Logout</button>
</div>

<div class="hero"></div>

<div class="btn download" id="downloadBtn" onclick="downloadLauncher()">Download Game</div>
<div class="btn portal" id="portalBtn" onclick="openLoginPanel()">Developer Portal</div>

<div id="panel" onclick="closePanelOnOverlay(event)">
  <div class="panel-content-wrapper">
    <img id="panelImg" alt="Panel Content">
    <div id="communityLinks" class="community-overlay">
      <a href="https://discord.gg/PTbxu9nPZq" target="_blank" class="action-btn">Discord Server</a>
      <a href="https://www.reddit.com/r/NetNoGamesCommunity/s/VMGdDDwaQU" target="_blank" class="action-btn">Subreddit</a>
    </div>
  </div>
</div>

<div id="loginOverlay" class="login-frame-mask">
  <div class="login-terminal-box">
    <div class="close-terminal-btn" onclick="closeLoginPanel()">×</div>
    <h2 class="login-title">Developer Portal</h2>

    <div id="authGateways">
      <button class="google-sso-btn" onclick="handleGoogleAuth()">Continue With Google</button>
      <div class="divider"><span>OR</span></div>
      
      <form id="authForm" onsubmit="handleDirectLogin(event)">
        <div class="terminal-input-row">
          <label>Email Address</label>
          <input type="email" id="authEmail" required>
        </div>
        <div class="terminal-input-row">
          <label>Password</label>
          <input type="password" id="authPassword" required>
        </div>
        <button type="submit" class="terminal-submit-btn">Login</button>
      </form>
    </div>

    <div id="credentialsStep" style="display: none;">
      <div class="terminal-input-row">
        <label>Choose Username (Max 15 Characters)</label>
        <input type="text" id="usernameInput" maxlength="15" placeholder="Enter custom username...">
      </div>
      <div class="terminal-input-row">
        <label>Set Account Password</label>
        <input type="password" id="setupPasswordInput" placeholder="Set a password...">
      </div>
      <button type="button" class="terminal-submit-btn" onclick="submitCredentialsStep()">Continue to Avatar</button>
    </div>

    <div id="avatarStep" style="display: none;">
      <div class="terminal-input-row">
        <label style="display: block; margin-bottom: 12px;">Select Profile Picture</label>
        <input type="file" id="avatarFileInput" accept="image/*" style="background: none; border: none; color: white;">
      </div>
      <button type="button" class="terminal-submit-btn" onclick="finalizeAccountRegistration()">Complete Registration</button>
    </div>

    <div id="loginError" class="terminal-alert-msg"></div>
  </div>
</div>

<div id="settingsOverlay" class="settings-overlay" onclick="if(event.target.id==='settingsOverlay')closeSettingsModal();">
  <div class="settings-box">
    <div class="settings-header">
      <h3 style="margin:0;">Settings</h3>
      <span style="cursor:pointer; font-size:24px; line-height:20px;" onclick="closeSettingsModal()">×</span>
    </div>
    
    <div class="settings-body">
      <div class="settings-sidebar">
        <button id="tabBtn-account_hub" class="settings-nav-btn active" onclick="switchSettingsTab('account_hub')">Account</button>
        <button id="tabBtn-terminate_hub" class="settings-nav-btn" style="color:#ff3333;" onclick="switchSettingsTab('terminate_hub')">Delete Account</button>
      </div>
      
      <div class="settings-content">
        <div id="tabView-account_hub" class="settings-tab-content">
          <div class="sub-nav">
            <button id="subTabBtn-sub_name" class="sub-nav-btn active" onclick="switchAccountSubTab('sub_name')">Username</button>
            <button id="subTabBtn-sub_avatar" class="sub-nav-btn" onclick="switchAccountSubTab('sub_avatar')">Avatar</button>
            <button id="subTabBtn-sub_desc" class="sub-nav-btn" onclick="switchAccountSubTab('sub_desc')">Bio Log</button>
          </div>
          
          <div id="subView-sub_name" class="sub-content-panel">
            <div class="terminal-input-row">
              <label>Update Username</label>
              <input type="text" id="settingProfileName" maxlength="15">
            </div>
            <button class="terminal-submit-btn" onclick="applySettingsNameChange()">Save Name</button>
          </div>
          
          <div id="subView-sub_avatar" class="sub-content-panel" style="display:none;">
            <div class="terminal-input-row">
              <label>Choose New Avatar Image</label>
              <input type="file" id="settingProfilePicInput" accept="image/*" class="file-input">
            </div>
            <button class="terminal-submit-btn" onclick="applySettingsAvatarChange()">Update Avatar Image</button>
          </div>
          
          <div id="subView-sub_desc" class="sub-content-panel" style="display:none;">
            <div class="terminal-input-row">
              <label>Profile Bio Description</label>
              <input type="text" id="settingProfileDesc" placeholder="Enter custom logs...">
            </div>
            <button class="terminal-submit-btn" onclick="applySettingsDescChange()">Save Logs</button>
          </div>
        </div>
        
        <div id="tabView-terminate_hub" class="settings-tab-content" style="display: none;">
          <h3 style="color:#ff3333; margin-top:0;">Danger Zone: Account Deletion</h3>
          <p style="color:#888; font-size:13px; line-height:1.5;">This action will permanently erase your data structure. Enter password to authorize node destruction.</p>
          
          <div class="terminal-input-row">
            <label>Profile Validation Password</label>
            <input type="password" id="deleteAccountPassword" placeholder="Enter password...">
          </div>
          <button class="terminal-submit-btn" style="background:#ff3333; margin-bottom: 15px;" onclick="applySettingsAccountTermination()">Authorize Account Destruction</button>
          
          <div style="text-align: center;">
            <span onclick="triggerResetKeyForDeletion()" style="color: #00aaff; font-size: 13px; cursor: pointer; text-decoration: underline;">
              Forgot Password? Reset via Email
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="portallogin.js"></script>
<script src="script.js"></script>
</body>
</html>
