<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetNo Games</title>
<style>
body {
  margin: 0; background: black; font-family: Arial, sans-serif; overflow-x: hidden;
}
/* HERO */
.hero {
  width: 100%; height: 100vh; background: url('mainmenu.png') no-repeat center 10%; background-size: 135% 100%;
}
/* BUTTONS */
.btn {
  position: absolute; left: 8%; padding: 12px 25px; background: #00aaff; color: white; cursor: pointer;
  border-radius: 5px; font-weight: bold; text-decoration: none; border: none; z-index: 10;
  box-shadow: 0 4px 15px rgba(0, 170, 255, 0.4); transition: 0.2s ease;
}
.btn:hover { background: #0088cc; transform: scale(1.05); }
.download { top: 60%; }
.portal { top: 70%; }
/* MENU */
#menuBtn {
  position: fixed; top: 15px; right: 15px; font-size: 28px; color: white; cursor: pointer;
  z-index: 1000; background: rgba(0, 0, 0, 0.5); padding: 5px 12px; border-radius: 5px;
}
/* SIDEBAR */
#sidebar {
  position: fixed; left: -220px; top: 0; width: 220px; height: 100%; background: #111; transition: 0.3s ease;
  z-index: 999; box-shadow: 5px 0 15px rgba(0,0,0,0.5);
}
#sidebar button {
  width: 100%; padding: 18px 20px; background: none; border: none; color: #ccc; text-align: left;
  font-size: 16px; cursor: pointer; border-bottom: 1px solid #222; transition: 0.2s;
}
#sidebar button:hover { background: #00aaff; color: white; }

/* TOP LEFT CIRCULAR IMAGE WINDOW HEADER */
#userProfileHeader {
  position: fixed; top: 15px; left: 15px; width: 46px; height: 46px; border-radius: 50%;
  border: 2px solid #00aaff; cursor: pointer; z-index: 1000; overflow: hidden;
  box-shadow: 0 0 12px rgba(0, 170, 255, 0.4); transition: 0.2s ease;
}
#userProfileHeader:hover { transform: scale(1.08); border-color: white; }
#headerProfilePic { width: 100%; height: 100%; object-fit: cover; }

/* DEVELOPER SIDEBAR OVERLAY */
#userSidebar {
  position: fixed; left: -260px; top: 0; width: 260px; height: 100%; background: #060609;
  border-right: 2px solid #00aaff; transition: 0.3s cubic-bezier(0.1, 0.8, 0.2, 1); z-index: 1002;
  box-shadow: 8px 0 25px rgba(0,0,0,0.6); display: flex; flex-direction: column;
}
.user-sidebar-profile { padding: 25px 15px; text-align: center; background: #0d0d12; border-bottom: 1px solid #1a1a26; }
#userSidebarPic { width: 75px; height: 75px; border-radius: 50%; border: 2px solid #00aaff; object-fit: cover; margin-bottom: 8px; }
#userSidebarName { color: white; margin: 0; font-size: 16px; letter-spacing: 0.5px; }
#userSidebar button {
  width: 100%; padding: 15px 20px; background: none; border: none; color: #aaa; text-align: left;
  font-size: 14px; cursor: pointer; border-bottom: 1px solid #14141f; transition: 0.2s ease;
}
#userSidebar button:hover { background: rgba(0, 170, 255, 0.1); color: #00aaff; padding-left: 25px; }
#userSidebar .logout-btn { margin-top: auto; border-top: 1px solid #1a1a26; color: #ff4444; }
#userSidebar .logout-btn:hover { background: rgba(255, 68, 68, 0.12); color: red; }

/* PANEL & LOGIN SYSTEM STYLES */
#panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0, 0, 0, 0.95); z-index: 998; overflow-y: auto; }
.panel-content-wrapper { position: relative; width: 100%; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; }
#panel img { width: 100%; max-width: 100%; height: auto; display: block; }
.community-overlay { display: none; position: absolute; top: 65%; left: 50%; transform: translate(-50%, -50%); flex-direction: column; gap: 20px; width: 90%; max-width: 280px; text-align: center; z-index: 1001; }
.action-btn { display: block; padding: 14px 25px; background: #00aaff; color: white; text-decoration: none; font-weight: bold; font-size: 16px; border-radius: 5px; box-shadow: 0 4px 15px rgba(0, 170, 255, 0.4); transition: 0.2s ease; }
.action-btn:hover { background: #0088cc; transform: scale(1.05); }

.login-frame-mask, .settings-overlay, .sub-panel-overlay, .steam-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
  background: rgba(0, 0, 0, 0.92); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 3000;
}
.login-terminal-box, .sub-panel-box {
  width: 90%; max-width: 360px; background: #08080c; border: 2px solid #00aaff; border-radius: 10px; padding: 30px 25px; box-sizing: border-box; position: relative; box-shadow: 0 0 35px rgba(0, 170, 255, 0.3); color: white;
}
.settings-box {
  width: 90%; max-width: 450px; background: #000000; border: 1px solid #2f3336; border-radius: 16px; display: flex; flex-direction: column; height: 75vh; overflow: hidden;
}
.settings-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #2f3336; color: #fff; font-weight: bold; font-size: 18px; }
.settings-body-vertical { display: flex; flex-direction: column; flex: 1; overflow-y: auto; padding: 10px 0; }
.x-menu-btn { background: none; border: none; color: #e7e9ea; padding: 16px 20px; text-align: left; cursor: pointer; font-size: 15px; font-weight: bold; transition: 0.2s; border-bottom: 1px solid #16181c; }
.x-menu-btn:hover { background: rgba(255, 255, 255, 0.08); }
.x-menu-btn-danger { color: #f4212e; }
.x-menu-btn-danger:hover { background: rgba(244, 33, 46, 0.1); }
.char-counter { font-size: 12px; color: #71767b; text-align: right; margin-top: 4px; display: block; }

.individual-sso-btn { width: 100%; padding: 12px; background: #00aaff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 15px; font-weight: bold; margin-bottom: 12px; transition: 0.2s ease; text-align: center; }
.individual-sso-btn:hover { background: #0088cc; transform: scale(1.02); }
.organization-sso-btn { width: 100%; padding: 12px; background: #191923; color: #00aaff; border: 1px solid #00aaff; border-radius: 5px; cursor: pointer; font-size: 15px; font-weight: bold; margin-bottom: 20px; transition: 0.2s ease; text-align: center; }
.organization-sso-btn:hover { background: rgba(0, 170, 255, 0.1); transform: scale(1.02); }
.approval-status-box { text-align: center; padding: 20px; color: white; }
.approval-status-box h3 { color: #ffcc00; font-size: 22px; margin-bottom: 15px; }
.approval-status-box p { color: #888; font-size: 14px; line-height: 1.6; }

.close-terminal-btn { position: absolute; top: 10px; right: 15px; font-size: 28px; color: #666; cursor: pointer; }
.close-terminal-btn:hover { color: red; }
.login-title { color: #00aaff; text-align: center; margin-bottom: 25px; }
.divider { text-align: center; color: #666; margin-bottom: 20px; }
.terminal-input-row { margin-bottom: 15px; }
.terminal-input-row label { display: block; color: #888; margin-bottom: 6px; font-size: 13px; }
.terminal-input-row input { width: 100%; padding: 12px; box-sizing: border-box; background: #111; border: 1px solid #333; border-radius: 5px; color: white; font-size: 14px; }
.terminal-input-row input:focus { outline: none; border-color: #00aaff; box-shadow: 0 0 10px rgba(0, 170, 255, 0.3); }
.terminal-submit-btn { width: 100%; padding: 12px; border: none; border-radius: 5px; background: #00aaff; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s ease; }
.terminal-submit-btn:hover { background: #0088cc; transform: scale(1.02); }
.terminal-alert-msg { color: red; margin-top: 15px; text-align: center; font-size: 13px; }

/* NETNOWORK CONSOLE LAYOUT DESIGN ENGINE */
.steam-box {
  width: 95%; max-width: 650px; height: 85vh; background: #1b2838; border: 1px solid #417a9b;
  border-radius: 4px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.8);
}
.steam-header {
  background: #171a21; padding: 15px 20px; display: flex; justify-content: space-between;
  align-items: center; color: #dcdedf; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #2a475e;
}
.steam-body { flex: 1; overflow-y: auto; padding: 25px; color: #c6d4df; font-size: 14px; }
.steam-input-group { margin-bottom: 18px; }
.steam-input-group label { display: block; color: #66c0f4; margin-bottom: 6px; font-weight: bold; }
.steam-input { width: 100%; padding: 10px; background: #101822; border: 1px solid #2a475e; color: #fff; border-radius: 3px; box-sizing: border-box; }
.steam-input:focus { outline: none; border-color: #66c0f4; }
.steam-btn-blueprint {
  background: linear-gradient(to right, #47b649 0%, #348838 100%); padding: 12px 30px;
  color: #fff; border: none; font-weight: bold; cursor: pointer; border-radius: 2px; display: inline-block;
}
.steam-btn-blueprint:hover { background: linear-gradient(to right, #52cf54 0%, #3c9b3f 100%); }
.steam-game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 15px; }

.steam-game-card { border-radius: 4px; overflow: hidden; transition: transform 0.2s; position: relative; border: 1px solid #2a475e; background: #171a21; }
.steam-game-card:hover { transform: translateY(-4px); }
