<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netno Developer Portal</title>
    <style>
        :root {
            --bg-primary: #121212;
            --bg-surface: #1e1e1e;
            --primary: #3b82f6;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border: #333333;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
        }
        header {
            background-color: var(--bg-surface);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .container {
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-danger { background-color: #ef4444; }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            background-color: #2a2a2a;
            border: 1px solid var(--border);
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }
        /* Screenshots Preview CSS Box */
        .screenshots-preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 15px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 8px;
            border: 1px dashed var(--border);
        }
        .screenshot-item {
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #444;
            height: 80px;
        }
        .screenshot-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .screenshot-item .replace-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.75);
            text-align: center;
            padding: 2px 0;
        }
        .screenshot-item .replace-lbl {
            font-size: 11px;
            color: #3b82f6;
            cursor: pointer;
            font-weight: bold;
        }
        .hidden-file-input {
            display: none;
        }
        .hidden-section { display: none; }
        
        /* Game Card Display styling */
        .steam-game-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            gap: 20px;
        }
        .card-thumb-container img {
            width: 150px;
            height: 85px;
            object-fit: cover;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <header>
        <h2>Netno Developer Center</h2>
        <div id="authStatusPanel">
            <button class="btn" id="loginBtn">Sign In with Google</button>
        </div>
    </header>

    <div class="container">
        <div id="portalDashboard" class="hidden-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>Your Published Games Engine</h3>
                <button class="btn" onclick="openSteamCreationEngine()">+ Create New Game Page</button>
            </div>
            <div id="steamGamesDeck"></div>
        </div>

        <div id="gameCreationEngine" class="hidden-section">
            <h3 id="engineFormTitle">Create Steam-Style Game Hub</h3>
            <form id="steamGameForm" onsubmit="saveSteamGamePage(event)">
                <input type="hidden" id="editGameId" value="">
                
                <div class="form-group">
                    <label>Game Title</label>
                    <input type="text" id="steamGameTitle" required placeholder="e.g., Cyberpunk 2077">
                </div>

                <div class="form-group">
                    <label>Genre</label>
                    <select id="steamGameGenre">
                        <option value="Action">Action</option>
                        <option value="Adventure">Adventure</option>
                        <option value="RPG">RPG</option>
                        <option value="Strategy">Strategy</option>
                        <option value="Horror">Horror</option>
                        <option value="Simulation">Simulation</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Visibility Status</label>
                    <select id="steamGameVisibility">
                        <option value="Public">Public (Visible on Launcher)</option>
                        <option value="Private">Private (Hidden/Draft)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Store Layout Theme Color</label>
                    <input type="color" id="steamGameTheme" value="#3b82f6">
                </div>

                <div class="form-group">
                    <label>Pricing Model</label>
                    <select id="steamPriceType" onchange="togglePriceAmountField()">
                        <option value="Free">Free to Play</option>
                        <option value="Paid">Paid/Commercial</option>
                    </select>
                </div>

                <div class="form-group" id="priceAmountWrapper" style="display:none;">
                    <label>Price Amount (INR)</label>
                    <input type="number" id="steamGamePriceAmount" placeholder="e.g., 499" value="0">
                </div>

                <div class="form-group">
                    <label>Game Header Thumbnail Image</label>
                    <input type="file" id="steamGameThumb" accept="image/*">
                </div>

                <div class="form-group">
                    <label>Game Screenshots (Select 2 to 10 Images)</label>
                    <input type="file" id="steamGameScreenshots" accept="image/*" multiple onchange="processScreenshotsBatch(this)">
                    
                    <div class="screenshots-preview-grid" id="screenshotsPreviewBox" style="display: none;"></div>
                </div>

                <div class="form-group">
                    <label>Game Trailer Video Link (YouTube Embed or Public URL)</label>
                    <input type="url" id="steamGameTrailer" placeholder="https://www.youtube.com/watch?v=...">
                </div>

                <div class="form-group">
                    <label>Execution/Executable Download Link</label>
                    <input type="url" id="steamGameUrl" required placeholder="https://drive.google.com/uc?export=download&id=...">
                </div>

                <div class="form-group">
                    <label>Detailed Description</label>
                    <textarea id="steamGameDesc" rows="5" placeholder="Write about your gameplay, features, and specs..."></textarea>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn">Publish to Cloud Network</button>
                    <button type="button" class="btn btn-danger" onclick="closeSteamCreationEngine()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <input type="file" id="individualScreenshotReplacer" accept="image/*" class="hidden-file-input" onchange="executeScreenshotReplacement(this)">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref as dbRef, set, get, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBoM6X--8Hhl9imrtYtgNeyomHLwk1RO6w",
            authDomain: "netno-games-d8580.firebaseapp.com",
            projectId: "netno-games-d8580",
            storageBucket: "netno-games-d8580.firebasestorage.app",
            messagingSenderId: "571332011408",
            appId: "1:571332011408:web:b40acafe4f258e4183bf15",
            databaseURL: "https://netno-games-d8580-default-rtdb.firebaseio.com/" // Connects to your exact US region instance
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        const provider = new GoogleAuthProvider();

        // Memory tracker array for holding base64 strings of screenshots globally
        let globalScreenshotsArray = [];
        let targetReplaceIndex = null;

        // UI toggles
        window.openSteamCreationEngine = function() {
            document.getElementById("portalDashboard").classList.add("hidden-section");
            document.getElementById("gameCreationEngine").classList.remove("hidden-section");
            document.getElementById("steamGameForm").reset();
            document.getElementById("editGameId").value = "";
            document.getElementById("engineFormTitle").innerText = "Create Steam-Style Game Hub";
            globalScreenshotsArray = [];
            document.getElementById("screenshotsPreviewBox").innerHTML = "";
            document.getElementById("screenshotsPreviewBox").style.display = "none";
        };

        window.closeSteamCreationEngine = function() {
            document.getElementById("gameCreationEngine").classList.add("hidden-section");
            document.getElementById("portalDashboard").classList.remove("hidden-section");
        };

        window.togglePriceAmountField = function() {
            const type = document.getElementById("steamPriceType").value;
            document.getElementById("priceAmountWrapper").style.display = (type === "Paid") ? "block" : "none";
        };

        // PROCESS SCREENSHOT BATCH AND COMPILING BASE64 PREVIEWS
        window.processScreenshotsBatch = async function(input) {
            const files = input.files;
            if (files.length === 0) return;

            globalScreenshotsArray = []; // Reset array
            
            for (let i = 0; i < files.length; i++) {
                const base64Str = await convertFileToBase64(files[i]);
                globalScreenshotsArray.push(base64Str);
            }
            renderScreenshotsPreviews();
        };

        // RENDER SCREENSHOT PREVIEWS ENGINE
        function renderScreenshotsPreviews() {
            const previewBox = document.getElementById("screenshotsPreviewBox");
            previewBox.innerHTML = "";
            
            if (globalScreenshotsArray.length === 0) {
                previewBox.style.display = "none";
                return;
            }

            previewBox.style.display = "grid";
            globalScreenshotsArray.forEach((base64Data, index) => {
                const itemDiv = document.createElement("div");
                itemDiv.className = "screenshot-item";
                itemDiv.innerHTML = `
                    <img src="${base64Data}" alt="preview">
                    <div class="replace-overlay">
                        <span class="replace-lbl" onclick="triggerScreenshotReplace(${index})">Replace</span>
                    </div>
                `;
                previewBox.appendChild(itemDiv);
            });
        }

        // TRIGGER REPLACEMENT LIFECYCLE FOR SPECIFIC ARRAY ELEMENT
        window.triggerScreenshotReplace = function(index) {
            targetReplaceIndex = index;
            document.getElementById("individualScreenshotReplacer").click();
        };

        window.executeScreenshotReplacement = async function(input) {
            if (input.files.length === 0 || targetReplaceIndex === null) return;
            const newBase64 = await convertFileToBase64(input.files[0]);
            globalScreenshotsArray[targetReplaceIndex] = newBase64; // Replaced element in static global storage array
            renderScreenshotsPreviews();
            input.value = ""; // Clear file selector string buffer
        };

        function convertFileToBase64(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(file);
            });
        }

        // SAVE DATA TO FIREBASE CLOUD CONTROLLER DATABASE
        window.saveSteamGamePage = async function(e) {
            e.preventDefault();
            const user = auth.currentUser;
            if (!user) {
                alert("Please log in first to write data payload updates.");
                return;
            }

            const editId = document.getElementById("editGameId").value;
            const title = document.getElementById("steamGameTitle").value.trim();
            const genre = document.getElementById("steamGameGenre").value;
            const visibility = document.getElementById("steamGameVisibility").value;
            const theme = document.getElementById("steamGameTheme").value;
            const priceType = document.getElementById("steamPriceType").value;
            const priceAmount = document.getElementById("steamGamePriceAmount").value;
            const displayPrice = (priceType === "Free") ? "Free" : `₹${priceAmount}`;
            const desc = document.getElementById("steamGameDesc").value.trim();
            const link = document.getElementById("steamGameUrl").value.trim();
            const trailerLink = document.getElementById("steamGameTrailer").value.trim(); // Reads direct link input text string
            
            const thumbInput = document.getElementById("steamGameThumb");

            if (!editId && globalScreenshotsArray.length < 2) {
                alert("Please upload at least 2 screenshots minimum.");
                return;
            }

            const gameId = editId ? editId : "game_" + Date.now();
            const dbPath = `users_games/${user.uid}/${gameId}`;

            try {
                let thumbnailBase64 = "";
                if (thumbInput.files.length > 0) {
                    thumbnailBase64 = await convertFileToBase64(thumbInput.files[0]);
                }

                const gamePayload = {
                    uniqueId: gameId,
                    title,
                    genre,
                    visibility,
                    theme,
                    price: displayPrice,
                    desc,
                    link,
                    trailer: trailerLink, // link path string saved directly under parent game structure node
                    createdBy: user.email,
                    screenshots: globalScreenshotsArray // Saved tracking preview grid cluster index arrays directly
                };

                if (thumbnailBase64 !== "") {
                    gamePayload.thumbnailBase64 = thumbnailBase64;
                }

                await set(dbRef(database, dbPath), gamePayload);
                alert(editId ? "Game info successfully modified on database cloud tree!" : "Asset generated under developer user node successfully!");
                
                closeSteamCreationEngine();
                renderSteamGamesDeck();
            } catch (err) {
                alert("Write request fault: " + err.message);
            }
        };

        // RENDER LIBRARY FLOW DECK CONTROLLER
        window.renderSteamGamesDeck = async function() {
            const user = auth.currentUser;
            const deck = document.getElementById("steamGamesDeck");
            if (!deck) return;
            deck.innerHTML = "";

            if (!user) return;

            try {
                const snapshot = await get(dbRef(database, `users_games/${user.uid}`));
                if (!snapshot.exists()) {
                    deck.innerHTML = `<p style="color:var(--text-muted);">No hubs developed yet. Spin up your creation engine initialization!</p>`;
                    return;
                }

                const data = snapshot.val();
                for (let id in data) {
                    const game = data[id];
                    const card = document.createElement("div");
                    card.className = "steam-game-card";
                    card.innerHTML = `
                        <div class="card-thumb-container">
                            <img src="${game.thumbnailBase64 || 'https://via.placeholder.com/150x85'}" alt="thumb">
                        </div>
                        <div class="card-details">
                            <h4>${game.title}</h4>
                            <p style="font-size:13px; color:var(--text-muted); margin: 5px 0;">Genre: ${game.genre} | Price: ${game.price}</p>
                            <div style="display:flex; gap:10px; margin-top:10px;">
                                <button class="btn" onclick="editSteamGamePage('${game.uniqueId}')" style="padding: 5px 12px; font-size:12px;">Edit</button>
                                <button class="btn btn-danger" onclick="deleteSteamGamePage('${game.uniqueId}')" style="padding: 5px 12px; font-size:12px;">Delete</button>
                            </div>
                        </div>
                    `;
                    deck.appendChild(card);
                }
            } catch (err) {
                console.error(err);
            }
        };

        // EDIT HUB DEPLOYMENT SYSTEM
        window.editSteamGamePage = async function(gameId) {
            const user = auth.currentUser;
            try {
                const snapshot = await get(dbRef(database, `users_games/${user.uid}/${gameId}`));
                if (!snapshot.exists()) return;
                
                const game = snapshot.val();
                openSteamCreationEngine();
                
                document.getElementById("engineFormTitle").innerText = "Edit Game Configuration Cloud Target";
                document.getElementById("editGameId").value = game.uniqueId;
                document.getElementById("steamGameTitle").value = game.title;
                document.getElementById("steamGameGenre").value = game.genre;
                document.getElementById("steamGameVisibility").value = game.visibility;
                document.getElementById("steamGameTheme").value = game.theme;
                document.getElementById("steamGameTrailer").value = game.trailer || "";
                document.getElementById("steamGameUrl").value = game.link;
                document.getElementById("steamGameDesc").value = game.desc;
                
                if (game.price === "Free") {
                    document.getElementById("steamPriceType").value = "Free";
                } else {
                    document.getElementById("steamPriceType").value = "Paid";
                    document.getElementById("steamGamePriceAmount").value = game.price.replace("₹", "");
                }
                togglePriceAmountField();

                if (game.screenshots) {
                    globalScreenshotsArray = game.screenshots;
                    renderScreenshotsPreviews();
                }
            } catch (e) {
                alert(e.message);
            }
        };

        // DISMANTLE SYSTEM DESTROYER HOOK
        window.deleteSteamGamePage = async function(gameId) {
            if (!confirm("Are you absolutely sure you want to eradicate this game deployment entry from cloud storage servers?")) return;
            const user = auth.currentUser;
            try {
                await remove(dbRef(database, `users_games/${user.uid}/${gameId}`));
                alert("Asset deleted completely.");
                renderSteamGamesDeck();
            } catch (e) {
                alert(e.message);
            }
        };

        // AUTH CONTEXT SYNC TRACKER LIFECYCLE
        document.getElementById("loginBtn").addEventListener("click", () => {
            signInWithPopup(auth, provider).catch(e => console.error(e));
        });

        onAuthStateChanged(auth, (user) => {
            const panel = document.getElementById("authStatusPanel");
            if (user) {
                panel.innerHTML = `<span style="margin-right:15px;">Dev: ${user.displayName}</span><button class="btn btn-danger" id="logoutBtn">Sign Out</button>`;
                document.getElementById("portalDashboard").classList.remove("hidden-section");
                renderSteamGamesDeck();
                
                document.getElementById("logoutBtn").addEventListener("click", () => {
                    signOut(auth).then(() => {
                        window.location.reload();
                    });
                });
            } else {
                document.getElementById("portalDashboard").classList.add("hidden-section");
                document.getElementById("gameCreationEngine").classList.add("hidden-section");
            }
        });
    </script>
</body>
</html>
