<div id="createGameSubPanel" class="sub-panel-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); z-index: 4000; justify-content: center; align-items: center;" onclick="if(event.target.id==='createGameSubPanel') { this.style.display='none'; }">
  <div class="sub-panel-box" style="width: 90%; max-width: 550px; background: #000000; border: 1px solid #2f3336; border-radius: 16px; padding: 25px; color: white; box-sizing: border-box; position: relative; max-height: 85vh; overflow-y: auto; box-shadow: 0 0 35px rgba(0, 170, 255, 0.25);">
    <div style="position:absolute; top:15px; right:20px; cursor:pointer; font-size:26px; color:#71767b; transition: 0.2s;" onclick="document.getElementById('createGameSubPanel').style.display='none';" onmouseover="this.style.color='red'" onmouseout="this.style.color='#71767b'">×</div>
    <h3 style="color: #00aaff; margin-top: 0; margin-bottom: 20px; font-size: 20px; border-bottom: 1px solid #16181c; padding-bottom: 12px; font-weight: bold; letter-spacing: 0.5px;">🎮 Publisher Hub: Create Game Page</h3>
    
    <div class="terminal-input-row" style="margin-bottom: 15px;">
      <label style="display: block; color: #888; margin-bottom: 6px; font-size: 13px;">Game Title / Name</label>
      <input type="text" id="steamGameName" placeholder="e.g., Cyberpunk 2077 Mini" style="width: 100%; padding: 12px; box-sizing: border-box; background: #111; border: 1px solid #333; border-radius: 5px; color: white; font-size: 14px;">
    </div>
    
    <div class="terminal-input-row" style="margin-bottom: 15px;">
      <label style="display: block; color: #888; margin-bottom: 6px; font-size: 13px;">Game Logo / Header Image (File Upload)</label>
      <input type="file" id="steamGameLogo" accept="image/*" class="file-input" style="background: none; border: none; padding: 5px 0; color: #888; width: 100%;">
    </div>

    <div class="terminal-input-row" style="margin-bottom: 15px;">
      <label style="display: block; color: #888; margin-bottom: 6px; font-size: 13px;">Trailer Video URL (YouTube Embed Link Preferred)</label>
      <input type="text" id="steamGameTrailer" placeholder="https://www.youtube.com/embed/your-video-id" style="width: 100%; padding: 12px; box-sizing: border-box; background: #111; border: 1px solid #333; border-radius: 5px; color: white; font-size: 14px;">
    </div>

    <div class="terminal-input-row" style="margin-bottom: 15px;">
      <label style="display: block; color: #888; margin-bottom: 6px; font-size: 13px;">Game Screenshots (Upload Multiple Files)</label>
      <input type="file" id="steamGameScreenshots" accept="image/*" multiple class="file-input" style="background: none; border: none; padding: 5px 0; color: #888; width: 100%;">
    </div>

    <div class="terminal-input-row" style="margin-bottom: 20px;">
      <label style="display: block; color: #888; margin-bottom: 6px; font-size: 13px;">About the Game (Description)</label>
      <textarea id="steamGameDesc" rows="4" placeholder="Describe your game mechanics, story, and system requirements..." style="width:100%; background:#111; border:1px solid #333; border-radius:5px; color:white; padding:12px; box-sizing:border-box; font-family:Arial, sans-serif; resize:none; font-size:14px; line-height:1.5;"></textarea>
    </div>

    <button class="terminal-submit-btn" onclick="publishSteamGamePage()" style="width: 100%; padding: 12px; border: none; border-radius: 5px; background: #00aaff; color: white; font-weight: bold; cursor: pointer; transition: 0.2s ease;">Publish Game Page</button>
  </div>
</div>

<div id="yourGamesSubPanel" class="sub-panel-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); z-index: 4000; justify-content: center; align-items: center;" onclick="if(event.target.id==='yourGamesSubPanel') { this.style.display='none'; }">
  <div class="sub-panel-box" style="width: 95%; max-width: 700px; background: #000000; border: 1px solid #2f3336; border-radius: 16px; padding: 25px; color: white; box-sizing: border-box; position: relative; max-height: 85vh; overflow-y: auto; box-shadow: 0 0 45px rgba(0, 170, 255, 0.3);">
    <div style="position:absolute; top:15px; right:20px; cursor:pointer; font-size:26px; color:#71767b; transition: 0.2s;" onclick="document.getElementById('yourGamesSubPanel').style.display='none';" onmouseover="this.style.color='red'" onmouseout="this.style.color='#71767b'">×</div>
    <h3 style="color: #00aaff; margin-top: 0; margin-bottom: 25px; font-size: 20px; border-bottom: 1px solid #2f3336; padding-bottom: 12px; font-weight: bold; letter-spacing: 0.5px;">🗂️ Your Published Games Library</h3>
    
    <div id="steamGamesContainer" style="display: flex; flex-direction: column; gap: 20px;">
      </div>
  </div>
</div>
