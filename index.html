<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetNo Games</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menuBtn" onclick="toggleMenu()">☰</div>

<div id="sidebar">
  <button onclick="openPanel('overviewinfo.png', false)">Overview</button>

  <!-- FIXED -->
  <button onclick="openLoginPanel()">Portal</button>

  <button onclick="openPanel('supportpanel.png', false)">Support</button>
  <button onclick="openPanel('communitypanels.png', true)">Community</button>
  <button onclick="openPanel('games.png', false)">Games</button>
</div>

<div class="hero"></div>

<div class="btn download" id="downloadBtn" onclick="downloadLauncher()">
  Download Game
</div>

<!-- FIXED -->
<div class="btn portal" id="portalBtn" onclick="openLoginPanel()">
  Developer Portal
</div>

<!-- IMAGE PANEL -->
<div id="panel" onclick="closePanelOnOverlay(event)">
  <div class="panel-content-wrapper">

    <img id="panelImg" alt="Panel Content">

    <div id="communityLinks" class="community-overlay">
      <a href="https://discord.gg/PTbxu9nPZq" target="_blank" class="action-btn">
        Discord Server
      </a>

      <a href="https://www.reddit.com/r/NetNoGamesCommunity/s/VMGdDDwaQU"
         target="_blank"
         class="action-btn">
        Subreddit
      </a>
    </div>

  </div>
</div>

<!-- LOGIN SYSTEM -->
<div id="loginOverlay" class="login-frame-mask">

  <div class="login-terminal-box">

    <div class="close-terminal-btn" onclick="closeLoginPanel()">
      ×
    </div>

    <h3 id="authBoxTitle">Developer Terminal</h3>

    <button id="googleAuthBtn"
            class="google-sso-btn"
            onclick="handleGoogleAuth()">

      Continue with Google
    </button>

    <div id="authSeparator" class="form-divider-row">
      <span>OR</span>
    </div>

    <!-- EMAIL LOGIN -->
    <form id="emailFormView"
          data-mode="login"
          onsubmit="handleEmailAuth(event)">

      <div class="terminal-input-row">
        <label>Email</label>

        <input type="email"
               id="authEmail"
               required>
      </div>

      <div class="terminal-input-row">
        <label>Password</label>

        <input type="password"
               id="authPassword"
               required>
      </div>

      <button type="submit"
              id="emailSubmitBtn"
              class="terminal-submit-btn">

        Verify Access
      </button>

    </form>

    <!-- USERNAME -->
    <form id="usernameSetupView"
          style="display:none;"
          onsubmit="handleUsernameSubmission(event)">

      <div class="terminal-input-row">
        <label>Username</label>

        <input type="text"
               id="profileUsername"
               required>
      </div>

      <button type="submit"
              class="terminal-submit-btn">

        Save Username
      </button>

    </form>

    <div id="loginError" class="terminal-alert-msg"></div>

    <div id="toggleAuthText" class="view-switch-footer">
      New Developer?
      <span onclick="toggleAuthView('register')">
        Create Account
      </span>
    </div>

  </div>

</div>

<!-- IMPORTANT -->
<script type="module" src="portallogin.js"></script>
<script src="script.js"></script>

</body>
</html>
