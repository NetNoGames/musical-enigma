<div id="createGameSubPanel" class="sub-panel-overlay" onclick="if(event.target.id==='createGameSubPanel') { this.style.display='none'; }">
  <div class="sub-panel-box" style="max-width: 550px; max-height: 85vh; overflow-y: auto;">
    <div style="position:absolute; top:10px; right:15px; cursor:pointer; font-size:24px; color:#71767b;" onclick="document.getElementById('createGameSubPanel').style.display='none';">×</div>
    <h3 style="color: #00aaff; border-bottom: 1px solid #2f3336; padding-bottom: 10px; margin-bottom: 20px;">🎮 Steam Publisher Portal: Create Game Page</h3>
    
    <div class="terminal-input-row">
      <label>1. Game Title / Name</label>
      <input type="text" id="steamGameName" placeholder="e.g., Cyberpunk 2077 Mini">
    </div>
    
    <div class="terminal-input-row">
      <label>2. Game Logo / Header Image (File Upload)</label>
      <input type="file" id="steamGameLogo" accept="image/*" class="file-input">
    </div>

    <div class="terminal-input-row">
      <label>3. Trailer Video URL (YouTube Embed Link Preferred)</label>
      <input type="text" id="steamGameTrailer" placeholder="https://www.youtube.com/embed/your-video-id">
    </div>

    <div class="terminal-input-row">
      <label>4. Game Screenshots (Upload Multiple Files)</label>
      <input type="file" id="steamGameScreenshots" accept="image/*" multiple class="file-input">
    </div>

    <div class="terminal-input-row">
      <label>5. About the Game (Description)</label>
      <textarea id="steamGameDesc" rows="4" placeholder="Describe your game mechanics, story, and system requirements..." style="width:100%; background:#111; border:1px solid #333; border-radius:5px; color:white; padding:10px; box-sizing:border-box; font-family:Arial, sans-serif; resize:none;"></textarea>
    </div>

    <button class="terminal-submit-btn" onclick="publishSteamGamePage()">Publish Game Page</button>
  </div>
</div>

<div id="yourGamesSubPanel" class="sub-panel-overlay" onclick="if(event.target.id==='yourGamesSubPanel') { this.style.display='none'; }">
  <div class="sub-panel-box" style="max-width: 750px; width: 95%; max-height: 85vh; overflow-y: auto;">
    <div style="position:absolute; top:10px; right:15px; cursor:pointer; font-size:24px; color:#71767b;" onclick="document.getElementById('yourGamesSubPanel').style.display='none';">×</div>
    <h3 style="color: #00aaff; border-bottom: 1px solid #2f3336; padding-bottom: 10px; margin-bottom: 20px;">🗂️ Your Published Games Library</h3>
    
    <div id="steamGamesContainer" style="display: flex; flex-direction: column; gap: 20px;">
      </div>
  </div>
</div>
