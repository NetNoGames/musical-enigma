<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>NetNo Games | Loading Details...</title>
  <!-- Tailwind CSS CDN with forms/container plugins -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
  <!-- Design System Variables & Core Styles -->
  <link href="style.css" rel="stylesheet"/>
  <!-- Tailwind configurations mapping to design system tokens -->
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            background: "var(--bg-color)",
            surface: "var(--surface-color)",
            "surface-dim": "var(--surface-dim)",
            "surface-bright": "var(--surface-bright)",
            "surface-container": "var(--surface-high)",
            "on-surface": "var(--on-surface)",
            "on-surface-variant": "var(--on-surface-variant)",
            "outline-variant": "var(--outline-variant)",
            "primary-color": "var(--primary-color)",
            "secondary-color": "var(--secondary-color)",
          },
          fontFamily: {
            display: ["Syne", "sans-serif"],
            body: ["Outfit", "sans-serif"],
          },
          spacing: {
            "margin-mobile": "16px",
            "margin-desktop": "64px",
            gutter: "24px",
            md: "24px",
            lg: "48px",
            xl: "80px",
          }
        }
      }
    };
  </script>
</head>
<body class="bg-background text-on-surface flex flex-col font-body overflow-x-hidden min-h-screen">

  <!-- Header injected here -->
  <header id="global-header" class="h-20"></header>

  <!-- Dynamic Content Slot -->
  <main class="flex-grow w-full max-w-screen-2xl mx-auto px-margin-mobile md:px-margin-desktop py-6 md:py-12 fade-in" id="detail-root">
    <!-- Loaded dynamically via JS -->
    <div class="h-96 rounded-lg border border-outline-variant/30 skeleton"></div>
  </main>

  <!-- Download Simulator Overlay Modal -->
  <div id="download-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden items-center justify-center z-[9999]">
    <div class="bg-surface border border-primary-color/40 p-8 rounded-lg max-w-md w-full mx-4 shadow-2xl relative" style="background-color: var(--surface-color);">
      <h3 class="font-display text-xl font-bold text-primary-color mb-4 text-glow flex items-center gap-2">
        <span class="material-symbols-outlined animate-bounce">downloading</span>
        ESTABLISHING DATA STREAM
      </h3>
      <p class="font-body text-xs text-on-surface-variant mb-6 leading-relaxed">
        Syncing with NetNo local archive nodes. Decompressing application launcher binaries...
      </p>
      
      <!-- Progress Bar -->
      <div class="w-full bg-background/60 rounded-full h-3 border border-outline-variant/30 overflow-hidden mb-4">
        <div id="download-progress-fill" class="bg-primary-color h-full w-0 transition-all duration-300" style="box-shadow: 0 0 10px var(--primary-color);"></div>
      </div>
      
      <div class="flex justify-between items-center text-xs">
        <span id="download-status-text" class="text-on-surface-variant font-semibold">Allocating memory...</span>
        <span id="download-percent" class="text-primary-color font-bold">0%</span>
      </div>
    </div>
  </div>

  <!-- Purchase Simulator Overlay Modal -->
  <div id="purchase-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden items-center justify-center z-[9999]">
    <div class="bg-surface border border-secondary-color/40 p-8 rounded-lg max-w-md w-full mx-4 shadow-2xl relative" style="background-color: var(--surface-color);">
      <button onclick="closePurchaseModal()" class="absolute top-4 right-4 text-on-surface-variant hover:text-primary-color text-xl">×</button>
      
      <h3 class="font-display text-3xl md:text-4xl lg:text-6xl font-bold text-primary-color text-glow mb-3 uppercase tracking-wider">
        Purchase Protocol
      </h3>
      <p class="font-body text-xs text-on-surface-variant mb-6 leading-relaxed" id="purchase-modal-desc">
        Authorize transactions to secure access credentials.
      </p>
      
      <form id="purchase-form" onsubmit="executeMockPurchase(event)">
        <div class="space-y-4 mb-6">
          <div>
            <label class="block text-[10px] text-on-surface-variant font-bold uppercase mb-1.5">Cardholder Name</label>
            <input type="text" required class="w-full bg-background border border-outline-variant/40 rounded px-3 py-2.5 text-sm custom-input" placeholder="e.g. John Doe"/>
          </div>
          <div>
            <label class="block text-[10px] text-on-surface-variant font-bold uppercase mb-1.5">Card Number</label>
            <input type="text" required pattern="\\d{16}" maxlength="16" class="w-full bg-background border border-outline-variant/40 rounded px-3 py-2.5 text-sm custom-input" placeholder="16 digit card number"/>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-[10px] text-on-surface-variant font-bold uppercase mb-1.5">Expiry Date</label>
              <input type="text" required pattern="\\d{2}/\\d{2}" maxlength="5" class="w-full bg-background border border-outline-variant/40 rounded px-3 py-2.5 text-sm custom-input" placeholder="MM/YY"/>
            </div>
            <div>
              <label class="block text-[10px] text-on-surface-variant font-bold uppercase mb-1.5">Security Code (CVV)</label>
              <input type="password" required pattern="\\d{3}" maxlength="3" class="w-full bg-background border border-outline-variant/40 rounded px-3 py-2.5 text-sm custom-input" placeholder="3 digits"/>
            </div>
          </div>
        </div>
        
        <button type="submit" class="w-full py-3 bg-secondary-color text-on-secondary font-display font-bold uppercase tracking-wider text-xs rounded hover:bg-teal-400 hover:box-glow-secondary active:scale-95 transition-all">
          Authorize Mock Purchase
        </button>
      </form>
    </div>
  </div>

  <!-- Footer injected here -->
  <footer id="global-footer"></footer>

  <!-- Scripts -->
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <script src="app.js"></script>
  
  <script>
    let activeGame = null;

    document.addEventListener("DOMContentLoaded", () => {
      const root = document.getElementById("detail-root");
      const gameId = new URLSearchParams(window.location.search).get("id");
      
      if (!gameId) {
        renderErrorState("URL missing game registration index parameter.");
        return;
      }

      activeGame = window.db.getGame(gameId);
      if (!activeGame) {
        renderErrorState(`No game entry exists for id index: ${gameId}`);
        return;
      }

      // 1. Update views counter and write back to localStorage
      activeGame.views = (activeGame.views || 0) + 1;
      window.db.saveGame(activeGame);

      // 2. Set title
      document.title = `${activeGame.title} | NetNo Games`;

      // 3. Render Game Detail Layout
      renderGameDetails();
    });

    function renderErrorState(message) {
      document.getElementById("detail-root").innerHTML = `
        <div class="text-center py-20 border border-outline-variant/30 rounded-lg p-6 max-w-xl mx-auto" style="background-color: var(--surface-color);">
          <span class="material-symbols-outlined text-[64px] text-error-color mb-4">gpp_maybe</span>
          <h2 class="font-display text-3xl md:text-4xl lg:text-6xl font-bold text-primary-color text-glow mb-2">Connection Failure</h2>
          <p class="font-body text-sm text-on-surface-variant mb-6">${message}</p>
          <a href="games.html" class="inline-block px-6 py-3 bg-primary-color text-blue-800 font-display font-bold text-xs uppercase rounded hover:bg-emerald-400">Back to Game Library</a>
        </div>
      `;
    }

    function renderGameDetails() {
      const root = document.getElementById("detail-root");
      
      const priceLabel = activeGame.priceType === 'Free' ? 'FREE' : activeGame.priceType === 'Upcoming' ? 'UPCOMING' : `₹${activeGame.price}`;
      
      // Check user login and purchase status
      const userEmail = window.auth.getUserEmail();
      const isLoggedIn = window.auth.isLoggedIn();
      const hasPurchased = isLoggedIn ? window.db.hasPurchased(userEmail, activeGame.id) : localStorage.getItem(`purchased_${activeGame.id}`) === 'true';
      const isWishlisted = isLoggedIn ? window.db.isInWishlist(userEmail, activeGame.id) : false;

      let ctaHtml = '';
      if (activeGame.priceType === 'Free' || hasPurchased) {
        ctaHtml = `
          <button onclick="launchDownloadSimulator()" class="w-full py-4 bg-primary-color text-blue-800 font-display font-bold uppercase tracking-wider text-xs rounded hover:bg-emerald-400 hover:box-glow transition-all active:scale-95 flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-[20px]">download_for_offline</span>
            Download Installer
          </button>
        `;
      } else if (activeGame.priceType === 'Upcoming') {
        ctaHtml = `
          <button disabled class="w-full py-4 bg-surface-bright/30 text-on-surface-variant font-display font-bold uppercase tracking-wider text-xs rounded border border-outline-variant/30 flex items-center justify-center gap-2 cursor-not-allowed">
            <span class="material-symbols-outlined text-[20px]">schedule</span>
            Coming Soon
          </button>
        `;
      } else {
        ctaHtml = `
          <button onclick="openPurchaseModal('${priceLabel}')" class="w-full py-4 bg-secondary-color text-on-secondary font-display font-bold uppercase tracking-wider text-xs rounded hover:bg-teal-400 hover:box-glow-secondary transition-all active:scale-95 flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-[20px]">shopping_cart</span>
            Buy Now for ${priceLabel}
          </button>
        `;
      }

      root.innerHTML = `
        <div class="space-y-6">

          <!-- Back button -->
          <a href="games.html" class="inline-flex items-center gap-1.5 text-on-surface-variant hover:text-primary-color font-display text-[10px] font-bold uppercase tracking-wider transition-colors">
            <span class="material-symbols-outlined text-[16px]">arrow_back</span>
            Back to Game Library
          </a>

          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8 items-start">
            
            <!-- Column 1 & 2: Gallery & Media Details -->
            <div class="lg:col-span-2 space-y-6 md:space-y-8">
              
              <!-- Large Hero Frame / Gallery Swapper -->
              <div class="bg-surface-container rounded-lg overflow-hidden border border-outline-variant/30 relative" style="background-color: var(--surface-color);">
                <div class="aspect-video w-full bg-black relative">
                  <img id="gallery-focused-image" src="${activeGame.screenshots[0] || activeGame.thumbnail || 'https://via.placeholder.com/1200x800'}" alt="${activeGame.title}" class="w-full h-full object-cover"/>
                </div>
                
                <!-- Thumbnails panel -->
                <div class="flex gap-2 p-3 overflow-x-auto border-t border-outline-variant/30 bg-background/50">
                  ${activeGame.screenshots.map((img, idx) => `
                    <button onclick="focusGalleryImage('${img}')" class="h-16 w-24 flex-shrink-0 border border-outline-variant/40 rounded overflow-hidden opacity-60 hover:opacity-100 focus:opacity-100 transition-opacity focus:border-primary-color focus:ring-1 focus:ring-primary-color/40">
                      <img src="${img}" alt="ss_${idx}" class="w-full h-full object-cover"/>
                    </button>
                  `).join('')}
                </div>
              </div>

              <!-- YouTube Video Trailer Overlay -->
              ${activeGame.trailer ? `
                <div class="bg-surface rounded-lg overflow-hidden border border-outline-variant/30" style="background-color: var(--surface-color);">
                  <h3 class="font-display font-semibold text-xs md:text-sm text-primary-color px-4 md:px-6 py-3 md:py-4 border-b border-outline-variant/30 uppercase tracking-wider flex items-center gap-2">
                    <span class="material-symbols-outlined">movie</span> Official Video Trailer
                  </h3>
                  <div class="aspect-video w-full bg-black">
                    <iframe class="w-full h-full" src="${activeGame.trailer}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                  </div>
                </div>
              ` : ''}

              <!-- Long Description & About -->
              <div class="bg-surface rounded-lg border border-outline-variant/30 p-4 md:p-6 space-y-3 md:space-y-4" style="background-color: var(--surface-color);">
                <h3 class="font-display text-2xl md:text-3xl lg:text-5xl font-bold text-primary-color text-glow pb-2 border-b border-outline-variant/30 uppercase tracking-wider">About the Project</h3>
                <p class="font-body text-sm text-on-surface-variant leading-relaxed whitespace-pre-line">${activeGame.desc}</p>
              </div>

            </div>

            <!-- Column 3: Info Panel -->
            <div class="space-y-4 md:space-y-6">
              
              <!-- Purchasing/Download Frame -->
              <div class="bg-surface rounded-lg border border-outline-variant/30 p-4 md:p-6 space-y-3 md:space-y-4" style="background-color: var(--surface-color);">
                <div class="flex justify-between items-end border-b border-outline-variant/20 pb-3">
                  <span class="text-xs text-on-surface-variant uppercase font-semibold">Access Cost</span>
                  <span class="font-display text-2xl font-bold text-primary-color text-glow">${priceLabel}</span>
                </div>
                
                <!-- Wishlist / Login -->
                <div class="flex gap-2">
                  ${isLoggedIn ? `
                    <button onclick="toggleWishlist('${activeGame.id}')" id="wishlist-btn" class="flex-1 py-2.5 border ${isWishlisted ? 'bg-red-950/30 border-red-500/40 text-red-400' : 'border-outline-variant/30 text-on-surface-variant hover:border-primary-color/50'} font-display text-[10px] font-bold uppercase tracking-wider transition-all flex items-center justify-center gap-1.5">
                      <span class="material-symbols-outlined text-[16px]">${isWishlisted ? 'favorite' : 'favorite_border'}</span>
                      ${isWishlisted ? 'Wishlisted' : 'Add to Wishlist'}
                    </button>
                  ` : `
                    <a href="portal.html" class="flex-1 py-2.5 border border-outline-variant/30 text-on-surface-variant hover:border-primary-color/50 font-display text-[10px] font-bold uppercase tracking-wider transition-all flex items-center justify-center gap-1.5">
                      <span class="material-symbols-outlined text-[16px]">login</span>
                      Login to Wishlist
                    </a>
                  `}
                  ${isLoggedIn ? `
                    <button onclick="window.auth.logout()" class="py-2.5 px-3 border border-outline-variant/30 text-on-surface-variant hover:border-red-500/40 hover:text-red-400 font-display text-[10px] font-bold uppercase tracking-wider transition-all flex items-center justify-center gap-1.5" title="Sign out">
                      <span class="material-symbols-outlined text-[16px]">logout</span>
                    </button>
                  ` : ''}
                </div>

                <!-- Dynamic buttons -->
                <div id="cta-button-container">
                  ${ctaHtml}
                </div>
              </div>

              <!-- Specifications Panel -->
              <div class="bg-surface rounded-lg border border-outline-variant/30 p-4 md:p-6 space-y-3 md:space-y-4" style="background-color: var(--surface-color);">
                <h3 class="font-display text-sm font-bold text-primary-color text-glow uppercase tracking-wider pb-2 border-b border-outline-variant/30">System Requirements</h3>
                <p class="font-body text-xs text-on-surface-variant leading-relaxed whitespace-pre-line">${activeGame.systemRequirements || 'No system requirements documented.'}</p>
              </div>

              <!-- Game Taxonomy Tags -->
              <div class="bg-surface rounded-lg border border-outline-variant/30 p-4 md:p-6 space-y-3 md:space-y-4" style="background-color: var(--surface-color);">
                <h3 class="font-display text-sm font-bold text-primary-color text-glow uppercase tracking-wider pb-2 border-b border-outline-variant/30">Registry Taxonomy</h3>
                <div class="flex flex-col gap-2">
                  <div class="flex items-center gap-3">
                    <span class="text-[10px] text-on-surface-variant uppercase font-bold w-16">Genre:</span>
                    <span class="font-display text-xs text-primary-color bg-primary-color/10 px-2 py-0.5 rounded font-semibold">${activeGame.genre}</span>
                  </div>
                  <div class="flex items-center gap-3">
                    <span class="text-[10px] text-on-surface-variant uppercase font-bold w-16">Theme:</span>
                    <span class="font-display text-xs text-secondary-color bg-secondary-color/10 px-2 py-0.5 rounded font-semibold">${activeGame.theme}</span>
                  </div>
                  <div class="flex items-center gap-3">
                    <span class="text-[10px] text-on-surface-variant uppercase font-bold w-16">Publisher:</span>
                    <span class="font-body text-xs text-on-surface font-semibold">${activeGame.developer}</span>
                  </div>
                  <div class="flex items-center gap-3">
                    <span class="text-[10px] text-on-surface-variant uppercase font-bold w-16">Visibility:</span>
                    <span class="font-body text-xs text-on-surface font-semibold">${activeGame.visibility}</span>
                  </div>
                  <div class="flex items-center gap-3">
                    <span class="text-[10px] text-on-surface-variant uppercase font-bold w-16">Created:</span>
                    <span class="font-body text-xs text-on-surface font-semibold">${activeGame.createdDate}</span>
                  </div>
                </div>
              </div>

              <!-- Version Changelog -->
              <div class="bg-surface rounded-lg border border-outline-variant/30 p-4 md:p-6 space-y-3 md:space-y-4" style="background-color: var(--surface-color);">
                <h3 class="font-display text-sm font-bold text-primary-color text-glow uppercase tracking-wider pb-2 border-b border-outline-variant/30">Changelog Updates</h3>
                <p class="font-body text-xs text-on-surface-variant leading-relaxed whitespace-pre-line">${activeGame.changelog || 'v1.0.0 - Initial deployment.'}</p>
              </div>

            </div>

          </div>
        </div>
      `;
    }

    // Gallery controller
    window.focusGalleryImage = function(src) {
      const focusImg = document.getElementById("gallery-focused-image");
      if (focusImg) focusImg.src = src;
    };

    // Wishlist Toggle
    window.toggleWishlist = function(gameId) {
      const userEmail = window.auth.getUserEmail();
      if (!userEmail) {
        window.toast("Please sign in to wishlist games.", "warning");
        return;
      }
      const isWishlisted = window.db.isInWishlist(userEmail, gameId);
      if (isWishlisted) {
        window.db.removeFromWishlist(userEmail, gameId);
        window.toast("Removed from wishlist.", "info");
      } else {
        window.db.addToWishlist(userEmail, gameId);
        window.toast("Added to wishlist!", "success");
      }
      const btn = document.getElementById("wishlist-btn");
      if (btn) {
        const icon = btn.querySelector(".material-symbols-outlined");
        const text = btn.childNodes[2];
        const newState = !isWishlisted;
        btn.className = `flex-1 py-2.5 border ${newState ? 'bg-red-950/30 border-red-500/40 text-red-400' : 'border-outline-variant/30 text-on-surface-variant hover:border-primary-color/50'} font-display text-[10px] font-bold uppercase tracking-wider transition-all flex items-center justify-center gap-1.5`;
        icon.textContent = newState ? 'favorite' : 'favorite_border';
        text.textContent = newState ? 'Wishlisted' : 'Add to Wishlist';
      }
    };

    // Download Simulator Controller
    window.launchDownloadSimulator = function() {
      const modal = document.getElementById("download-modal");
      const progressFill = document.getElementById("download-progress-fill");
      const statusText = document.getElementById("download-status-text");
      const percentText = document.getElementById("download-percent");
      
      modal.classList.remove("hidden");
      modal.classList.add("flex");
      
      progressFill.style.width = "0%";
      percentText.innerText = "0%";
      statusText.innerText = "Connecting local node...";

      let progress = 0;
      const downloadInterval = setInterval(() => {
        progress += Math.floor(Math.random() * 15) + 5;
        if (progress >= 100) {
          progress = 100;
          clearInterval(downloadInterval);
          
          progressFill.style.width = "100%";
          percentText.innerText = "100%";
          statusText.innerText = "Launcher stream fully initialized! 🚀";

          // Track downloads stat increase
          activeGame.downloads = (activeGame.downloads || 0) + 1;
          window.db.saveGame(activeGame);

          // Record download in user profile
          const userEmail = window.auth.getUserEmail();
          if (userEmail) {
            window.db.recordDownload(userEmail, activeGame.id);
          }

          setTimeout(() => {
            modal.classList.add("hidden");
            modal.classList.remove("flex");
            window.toast("NetNo Launcher download successfully launched!", "success");
          }, 1200);
        } else {
          progressFill.style.width = `${progress}%`;
          percentText.innerText = `${progress}%`;
          
          const statuses = [
            "Handshaking with peer-to-peer registry...",
            "Decrypting binary structures...",
            "Syncing database configurations...",
            "Validating verification keys...",
            "Writing local temporary folders..."
          ];
          statusText.innerText = statuses[Math.floor(progress / 22)] || "Buffering cache...";
        }
      }, 300);
    };

    // Purchase Modal Controllers
    window.openPurchaseModal = function(price) {
      document.getElementById("purchase-modal-desc").innerText = `Authorize secure simulated payment transaction of ${price} to verify your network access keys.`;
      document.getElementById("purchase-modal").classList.remove("hidden");
      document.getElementById("purchase-modal").classList.add("flex");
    };

    window.closePurchaseModal = function() {
      document.getElementById("purchase-modal").classList.add("hidden");
      document.getElementById("purchase-modal").classList.remove("flex");
    };

    window.executeMockPurchase = function(e) {
      e.preventDefault();
      
      // Save purchase flag to localStorage (backwards compat)
      localStorage.setItem(`purchased_${activeGame.id}`, 'true');
      
      // Record purchase in user profile
      const userEmail = window.auth.getUserEmail();
      if (userEmail) {
        window.db.purchaseGame(userEmail, activeGame.id, activeGame.price);
      }
      
      window.toast("Transaction verified! Game access node unlocked.", "success");
      closePurchaseModal();
      
      // Re-render layout details to swap the Buy button with the Download button
      renderGameDetails();
    };
  </script>
</body>
</html>
