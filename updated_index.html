<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetNo Games</title>
<link rel="stylesheet" href="style.css">

<style>
#loginOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.loginBox {
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.loginBox input {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 200px;
}

.loginBox button {
  padding: 10px 20px;
}
</style>

</head>
<body>

<div id="loginOverlay">
  <div class="loginBox">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<div id="menuBtn" onclick="toggleMenu()">☰</div>

<div id="sidebar">
  <button onclick="openPanel('overviewinfo.png')">Overview</button>
  <button onclick="openPanel('developerportal.png')">Portal</button>
  <button onclick="openPanel('supportpanel.png')">Support</button>
  <button onclick="openPanel('communitypanels.png')">Community</button>
  <button onclick="openPanel('games.png')">Games</button>
</div>

<div class="hero"></div>

<div class="btn download" id="downloadBtn" onclick="downloadLauncher()">Download Game</div>
<div class="btn portal" id="portalBtn" onclick="openPanel('developerportal.png')">Developer Portal</div>

<div id="panel">
  <img id="panelImg">
</div>

<script>
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if (user === "admin" && pass === "1234") {
    document.getElementById("loginOverlay").style.display = "none";
  } else {
    alert("Wrong credentials!");
  }
}
</script>

<script src="script.js"></script>

</body>
</html>
